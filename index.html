/* ================= render: ESTATÍSTICAS ================= */
function computeYearlyHoras(year){
  const arr = [];
  for(let m=0; m<12; m++){
    const summary = monthlyStatusSummary(year, m);
    let aulas = 0;
    Object.values(summary).forEach(v=>{ aulas += v.p; });
    arr.push(aulas); // 1 aula = 1 hora
  }
  return arr;
}
function navStatsYear(delta){
  state.statsYear += delta;
  renderEstatisticas();
}
function statBarRow(i, val, maxVal, totalYear, colorPair, fmt){
  const pct = maxVal>0 ? Math.round((val/maxVal)*100) : 0;
  const pctYear = totalYear>0 ? Math.round((val/totalYear)*100) : 0;
  return `<div class="es-row">
    <span class="es-lbl" style="color:${colorPair.fg}">${MONTHS_SHORT[i]}</span>
    <div class="es-track"><div class="es-fill" style="width:${val?Math.max(pct,3):0}%;background:${colorPair.fg}"></div></div>
    <span class="es-val">${fmt(val)}</span>
    <span class="es-pct" style="color:${colorPair.fg};background:${colorPair.bg}">${pctYear}%</span>
  </div>`;
}
function renderEstatisticas(){
  const el = document.getElementById('v-estatisticas');
  if(!el) return;
  const year = state.statsYear || new Date().getFullYear();
  const now = new Date();
  const isCurYear = year === now.getFullYear();
  const curM = now.getMonth();

  const ganhosComputed = computeYearlyRecebido(year);
  const ganhos = ganhosComputed.map((c,i)=>getMonthValue(year,i,c));
  const horas = computeYearlyHoras(year);

  const totalGanhos = ganhos.reduce((a,b)=>a+b,0);
  const totalHoras = horas.reduce((a,b)=>a+b,0);
  const mesesComGanho = ganhos.filter(v=>v>0).length || 1;
  const mesesComHoras = horas.filter(v=>v>0).length || 1;
  const mediaGanho = totalGanhos / mesesComGanho;
  const mediaHoras = totalHoras / mesesComHoras;
  const maxGanho = Math.max(1, ...ganhos);
  const maxHoras = Math.max(1, ...horas);

  function pctChange(arr, idx){
    if(idx<=0) return null;
    const prev = arr[idx-1], cur = arr[idx];
    if(prev===0) return cur>0 ? 100 : null;
    return Math.round(((cur-prev)/prev)*100);
  }
  const ganhoChange = isCurYear ? pctChange(ganhos, curM) : null;
  const horaChange = isCurYear ? pctChange(horas, curM) : null;
  const changeBadge = (v)=>{
    if(v===null) return '';
    const up = v>=0;
    return `<span class="es-change ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(v)}% ${t('estatisticas.vsLastMonth')}</span>`;
  };

  el.innerHTML = `
    <div class="sec-head"><div>
      <h2>${t('estatisticas.title')}</h2>
      <div class="sub">${t('estatisticas.sub')}</div>
    </div></div>
    <div class="rp-monthbar">
      <button class="ag-nav" onclick="navStatsYear(-1)" title="${t('estatisticas.prevYear')}">‹</button>
      <div class="rp-month-name">${year}</div>
      <button class="ag-nav" onclick="navStatsYear(1)" title="${t('estatisticas.nextYear')}">›</button>
    </div>
    <div class="es-stats">
      <div class="es-stat es-stat-violet"><span class="es-stat-lbl">${t('estatisticas.annualEarnings')}</span><span class="es-stat-val">${fmtBRL(totalGanhos)}</span></div>
      <div class="es-stat es-stat-sky"><span class="es-stat-lbl">${t('estatisticas.avgEarnings')}</span><span class="es-stat-val">${fmtBRL(mediaGanho)}</span></div>
      <div class="es-stat es-stat-emerald"><span class="es-stat-lbl">${t('estatisticas.annualHours')}</span><span class="es-stat-val">${totalHoras}h</span></div>
      <div class="es-stat es-stat-amber"><span class="es-stat-lbl">${t('estatisticas.avgHours')}</span><span class="es-stat-val">${mediaHoras.toFixed(1)}h</span></div>
    </div>

    <div class="sec-head" style="margin-top:26px"><div>
      <h2 style="font-size:18px">${t('estatisticas.monthlyEarnings')}</h2>
      <div class="sub">${t('estatisticas.earningsSub')}</div>
    </div>${changeBadge(ganhoChange)}</div>
    <div class="card panel">
      <div class="es-chart">
        ${ganhos.map((v,i)=>statBarRow(i, v, maxGanho, totalGanhos, DC_MONTH_COLORS[i], fmtBRL)).join('')}
      </div>
    </div>

    <div class="sec-head" style="margin-top:26px"><div>
      <h2 style="font-size:18px">${t('estatisticas.monthlyHours')}</h2>
      <div class="sub">${t('estatisticas.hoursSub')}</div>
    </div>${changeBadge(horaChange)}</div>
    <div class="card panel">
      <div class="es-chart">
        ${horas.map((v,i)=>statBarRow(i, v, maxHoras, totalHoras, DC_MONTH_COLORS[i], h=>h+'h')).join('')}
      </div>
    </div>`;
}

/* ================= modals ================= */
const overlay = document.getElementById('overlay');
function closeModal(){ overlay.classList.remove('on'); overlay.innerHTML=''; }
function applyTheme(isDark){
  document.body.classList.toggle('dark', isDark);
  const label = document.getElementById('theme-toggle-label');
  const ico = document.getElementById('theme-toggle-ico');
  if(label) label.textContent = isDark ? t('theme.light') : t('theme.dark');
  if(ico) ico.textContent = isDark ? '☀️' : '🌙';
}
async function toggleTheme(){
  const isDark = !document.body.classList.contains('dark');
  applyTheme(isDark);
  await write('theme', isDark ? 'dark' : 'light');
}
function applyLangLabel(lang){
  const label = document.getElementById('lang-toggle-label');
  if(label) label.textContent = lang==='en' ? 'English (US)' : 'Português (BR)';
  document.documentElement.lang = lang==='en' ? 'en-US' : 'pt-BR';
}
function applyLang(lang){
  state.lang = lang;
  applyLangLabel(lang);
  applyNavLabels();
  renderAll();
}
function applyNavLabels(){
  document.querySelectorAll('#nav button[data-view]').forEach(btn=>{
    const view = btn.dataset.view;
    const span = btn.querySelector('.ico');
    const key = 'nav.'+view;
    btn.innerHTML = '';
    if(span) btn.appendChild(span);
    btn.appendChild(document.createTextNode(t(key)));
  });
}
async function toggleLang(){
  const next = state.lang==='en' ? 'pt' : 'en';
  applyLang(next);
  await write('lang', next);
}
overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
function showModal(html){ overlay.innerHTML = `<div class="modal">${html}</div>`; overlay.classList.add('on'); }
function confirmBox(message, actionJs, opts){
  opts = opts || {};
  const yesLabel = opts.yesLabel || t('confirm.yes');
  const icon = opts.icon || '⚠️';
  const danger = opts.danger !== false;
  showModal(`
    <div class="cf-icon">${icon}</div>
    <h3 class="cf-title">${opts.title || t('confirm.title')}</h3>
    <div class="msub cf-msg">${esc(message)}</div>
    <div class="modal-acts cf-acts">
      <button class="btn btn-ghost" onclick="closeModal()">${t('common.cancel')}</button>
      <button class="btn btn-primary ${danger?'cf-danger-btn':''}" onclick="${actionJs}">${esc(yesLabel)}</button>
    </div>`);
}

/* ---- aluno: cadastro / edição ---- */
const LEVEL_OPTIONS = ['Kids','Basic','Intermediate','Pre-Advanced','Advanced','Master','Others'];
function openAluno(id){
  const s = id ? studentById(id) : null;
  const statusOpt = (k,l)=>`<option value="${k}" ${ (s?s.status:'ativo')===k?'selected':''}>${l}</option>`;
  const curLevel = s?(s.level||''):'';
  const levelOpts = [`<option value="">—</option>`]
    .concat(LEVEL_OPTIONS.map(lv=>`<option value="${lv}" ${curLevel===lv?'selected':''}>${lv}</option>`)).join('')
    + (curLevel && !LEVEL_OPTIONS.includes(curLevel) ? `<option value="${esc(curLevel)}" selected>${esc(curLevel)}</option>` : '');
  const ageNow = s ? ageFromDOB(s.birth) : null;
  showModal(`
    <div class="modal-header-grad">
      <h3>${s?t('alunos.formTitleEdit'):t('alunos.formTitleNew')}</h3>
      <div class="msub">${s?t('alunos.updateData')+' '+esc(s.name)+'.':t('alunos.fillData')}</div>
    </div>
    <div class="field"><label>${t('alunos.name')}</label>
      <input id="al-nome" value="${s?esc(s.name):''}" placeholder="${t('alunos.namePh')}"></div>
    <div class="field"><label>${t('alunos.phone')}</label>
      <input id="al-fone" value="${s?esc(s.phone||''):''}" placeholder="(11) 90000-0000" inputmode="numeric" oninput="this.value=maskPhoneBR(this.value)"></div>
    <div class="field"><label>${t('alunos.birth')}</label>
      <div class="al-inline">
        <input id="al-nasc" type="date" value="${s&&s.birth?s.birth:''}" oninput="updateAge()">
        <span class="al-age" id="al-age">${ageNow!=null?ageNow+' '+t('alunos.age'):''}</span>
      </div>
    </div>
    <div class="field-2">
      <div class="field"><label>${t('alunos.status')}</label>
        <select id="al-status">${statusOpt('ativo',t('alunos.active'))}${statusOpt('trancado',t('alunos.paused'))}${statusOpt('cancelado',t('alunos.cancelled'))}</select></div>
      <div class="field"><label>${t('alunos.levelCat')}</label>
        <select id="al-nivel">${levelOpts}</select></div>
    </div>
    <div class="field"><label>${t('alunos.startDate')}</label>
      <input id="al-inicio" type="date" value="${s&&s.startDate?s.startDate:''}"></div>
    <div class="field"><label>${t('alunos.price')}</label>
      <div class="al-money"><span>R$</span><input id="al-valor" type="number" min="0" step="0.01" value="${s&&s.price!=null?s.price:''}" placeholder="0,00"></div>
    </div>
    <div class="modal-acts">
      <button class="btn btn-ghost" onclick="closeModal()">${t('common.cancel')}</button>
      <button class="btn btn-primary" onclick="saveAluno('${id||''}')">${s?t('alunos.saveEdit'):t('alunos.saveNew')}</button>
    </div>`);
  setTimeout(()=>{ const i=document.getElementById('al-nome'); if(i) i.focus(); }, 50);
}
function updateAge(){
  const d = document.getElementById('al-nasc'); const a = document.getElementById('al-age');
  if(!d||!a) return;
  const age = ageFromDOB(d.value);
  a.textContent = age!=null ? age+' '+t('alunos.age') : '';
}
async function saveAluno(id){
  const name = fv('al-nome');
  if(!name){ const i=document.getElementById('al-nome'); if(i) i.focus(); return; }
  const valorRaw = fv('al-valor');
  const data = {
    name,
    phone: fv('al-fone'),
    birth: fv('al-nasc'),
    status: (document.getElementById('al-status')||{}).value || 'ativo',
    level: (document.getElementById('al-nivel')||{}).value || '',
    startDate: fv('al-inicio'),
    price: valorRaw==='' ? '' : Number(valorRaw)
  };
  if(id){
    Object.assign(studentById(id), data);
  }else{
    data.id = uid();
    data.color = AV_COLORS[state.students.length % AV_COLORS.length];
    state.students.push(data);
  }
  await save('students'); closeModal(); renderPainel(); renderAlunos();
}
function delAluno(id){
  const s = studentById(id); if(!s) return;
  confirmBox(s.name+'? '+t('alunos.confirmDeleteMsg'), `doDelAluno('${id}')`);
}
async function doDelAluno(id){
  state.students = state.students.filter(x=>x.id!==id);
  state.lessons  = state.lessons.filter(l=>l.studentId!==id);
  removeStudentFromAgenda(id);
  purgeStudentData(id);
  await save('students'); await save('lessons');
  await write('agendaRecurring', state.agendaRecurring);
  await write('agendaOverrides', state.agendaOverrides);
  await write('presenca', state.presenca);
  await write('pagamentos', state.pagamentos);
  await write('financeiroAjustes', state.financeiroAjustes);
  closeModal(); renderAll();
}
function removeStudentFromAgenda(studentId){
  Object.keys(state.agendaRecurring).forEach(key=>{
    state.agendaRecurring[key] = state.agendaRecurring[key].filter(e=>e.studentId!==studentId);
    if(!state.agendaRecurring[key].length) delete state.agendaRecurring[key];
  });
  // Não apagar a chave do override mesmo se ficar vazia: uma semana específica
  // pode ter sido intencionalmente reduzida (ex: outro aluno excluído só naquela
  // semana) e isso precisa continuar valendo mesmo depois desta limpeza.
  Object.keys(state.agendaOverrides).forEach(key=>{
    state.agendaOverrides[key] = state.agendaOverrides[key].filter(e=>e.studentId!==studentId);
  });
}
function purgeStudentData(studentId){
  Object.keys(state.presenca).forEach(k=>{
    if(k.split('_')[2]===studentId) delete state.presenca[k];
  });
  Object.keys(state.pagamentos).forEach(k=>{
    if(k.split('_')[0]===studentId) delete state.pagamentos[k];
  });
  Object.keys(state.financeiroAjustes).forEach(k=>{
    if(k.split('_')[0]===studentId) delete state.financeiroAjustes[k];
  });
}
function purgeAllOrphanedStudentData(){
  const validIds = new Set(state.students.map(s=>s.id));
  let changed = false;
  const before = state.lessons.length;
  state.lessons = state.lessons.filter(l=>validIds.has(l.studentId));
  if(state.lessons.length !== before) changed = true;
  Object.keys(state.agendaRecurring).forEach(key=>{
    const before2 = state.agendaRecurring[key].length;
    state.agendaRecurring[key] = state.agendaRecurring[key].filter(e=>validIds.has(e.studentId));
    if(state.agendaRecurring[key].length !== before2) changed = true;
    if(!state.agendaRecurring[key].length){ delete state.agendaRecurring[key]; changed = true; }
  });
  Object.keys(state.agendaOverrides).forEach(key=>{
    const before2 = state.agendaOverrides[key].length;
    state.agendaOverrides[key] = state.agendaOverrides[key].filter(e=>validIds.has(e.studentId));
    if(state.agendaOverrides[key].length !== before2) changed = true;
  });
  Object.keys(state.presenca).forEach(k=>{
    const sid = k.split('_')[2];
    if(!validIds.has(sid)){ delete state.presenca[k]; changed = true; }
  });
  Object.keys(state.pagamentos).forEach(k=>{
    const sid = k.split('_')[0];
    if(!validIds.has(sid)){ delete state.pagamentos[k]; changed = true; }
  });
  Object.keys(state.financeiroAjustes).forEach(k=>{
    const sid = k.split('_')[0];
    if(!validIds.has(sid)){ delete state.financeiroAjustes[k]; changed = true; }
  });
  return changed;
}

/* ================= nav ================= */
function go(view){
  state.view=view;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.view===view));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('v-'+view).classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('nav').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(b) go(b.dataset.view);
});

  renderBrand();
  renderPainel(); renderLogin(); renderAlunos(); renderTopicos(); renderExpressoes();
  renderPresenca(); renderAgenda();
  renderRelatorio(); renderFinanceiro(); renderDespesas(); renderInfo(); renderDeclaracao(); renderEstatisticas();
  renderAuthGate();
}
boot();
