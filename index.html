async function generateMonthlyReportPDF() {
  const studentId = state.monthlyReportStudent;
  if (!studentId) {
    alert(state.lang === 'en' ? "Please select a student first!" : "Por favor, selecione um aluno primeiro!");
    return;
  }
  
  const student = studentById(studentId);
  if (!student) return;
  
  const month = state.monthlyReportMonth;
  const year = state.monthlyReportYear;
  const lessons = fetchStudentLessons(studentId, year, month);
  
  if (lessons.length === 0) {
    alert(state.lang === 'en' ? "No lessons found for this period to generate a PDF." : "Nenhuma aula encontrada para este período para gerar o PDF.");
    return;
  }
  
  const originalBtn = document.querySelector("#v-relatorio-mensal .btn-primary");
  let oldHtml = '';
  if (originalBtn) {
    oldHtml = originalBtn.innerHTML;
    originalBtn.disabled = true;
    originalBtn.innerHTML = state.lang === 'en' ? 'Generating PDF...' : 'Gerando PDF...';
  }
  
  try {
    if (typeof window.jspdf === 'undefined') {
      await new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({
      orientation: 'portrait',
      unit: 'mm',
      format: 'a4'
    });
    
    const margin = 20;
    const width = 210;
    const height = 297;
    let y = 25;
    
    const primaryColor = [15, 23, 42]; 
    const secondaryColor = [79, 70, 229]; 
    const textColor = [51, 65, 85]; 
    const lightBg = [248, 250, 252]; 
    
    doc.setFillColor(...primaryColor);
    doc.rect(0, 0, width, 12, 'F');
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(20);
    doc.setTextColor(...primaryColor);
    doc.text(state.lang === 'en' ? "MONTHLY LEARNING SUMMARY" : "RESUMO MENSAL DE APRENDIZADO", margin, y);
    y += 8;
    
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(100, 116, 139);
    doc.text("English Class System · Private Instruction Report", margin, y);
    y += 12;
    
    doc.setFillColor(...lightBg);
    doc.roundedRect(margin, y, width - (margin * 2), 24, 3, 3, 'F');
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10);
    doc.setTextColor(...primaryColor);
    doc.text(state.lang === 'en' ? "STUDENT:" : "ALUNO(A):", margin + 6, y + 8);
    doc.text(state.lang === 'en' ? "LEVEL:" : "NÍVEL:", margin + 6, y + 16);
    
    const monthName = state.lang === 'en' ? 
      ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"][month] : 
      ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"][month];
      
    doc.text(state.lang === 'en' ? "PERIOD:" : "PERÍODO:", margin + 110, y + 8);
    doc.text(state.lang === 'en' ? "REPORT DATE:" : "DATA DE EMISSÃO:", margin + 110, y + 16);
    
    doc.setFont("helvetica", "normal");
    doc.setTextColor(...textColor);
    doc.text(student.name, margin + 28, y + 8);
    doc.text(student.level || '—', margin + 28, y + 16);
    doc.text(`${monthName} ${year}`, margin + 130, y + 8);
    doc.text(new Date().toLocaleDateString(state.lang === 'en' ? 'en-US' : 'pt-BR'), margin + 150, y + 16);
    y += 36;
    
    const presentCount = lessons.filter(l => l.status === 'p').length;
    const absentCount = lessons.filter(l => l.status === 'f').length;
    const canceledCount = lessons.filter(l => l.status === 'c').length;
    
    const topicsList = lessons.filter(l => l.topic).map(l => l.topic);
    const distinctTopics = [...new Set(topicsList)];
    
    const notesList = lessons.filter(l => l.notes && l.notes !== '—').map(l => l.notes);
    const distinctNotes = [...new Set(notesList)];
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.setTextColor(...secondaryColor);
    doc.text(state.lang === 'en' ? "1. Attendance & Class Statistics" : "1. Estatísticas de Presença", margin, y);
    y += 4;
    doc.setDrawColor(226, 232, 240);
    doc.setLineWidth(0.5);
    doc.line(margin, y, width - margin, y);
    y += 6;
    
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(...textColor);
    
    const statsText = state.lang === 'en' ? 
      `Total Scheduled: ${lessons.length} classes  |  Present: ${presentCount}  |  Absent: ${absentCount}  |  Excused: ${canceledCount}` :
      `Total Agendado: ${lessons.length} aulas  |  Presenças: ${presentCount}  |  Faltas: ${absentCount}  |  Dispensadas: ${canceledCount}`;
      
    doc.text(statsText, margin + 4, y);
    y += 12;
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.setTextColor(...secondaryColor);
    doc.text(state.lang === 'en' ? "2. Covered Topics & Skills" : "2. Tópicos e Conteúdos Desenvolvidos", margin, y);
    y += 4;
    doc.line(margin, y, width - margin, y);
    y += 6;
    
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(...textColor);
    
    if (distinctTopics.length === 0) {
      doc.text(state.lang === 'en' ? "No specific topics were logged for this month." : "Nenhum tópico específico foi registrado para este mês.", margin + 4, y);
      y += 8;
    } else {
      distinctTopics.forEach(t => {
        const lines = doc.splitTextToSize(`•  ${t}`, width - (margin * 2) - 8);
        lines.forEach(line => {
          doc.text(line, margin + 4, y);
          y += 5.5;
        });
      });
      y += 4;
    }
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.setTextColor(...secondaryColor);
    doc.text(state.lang === 'en' ? "3. Teacher Assessment & Observations" : "3. Avaliação do Professor e Observações", margin, y);
    y += 4;
    doc.line(margin, y, width - margin, y);
    y += 6;
    
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(...textColor);
    
    if (distinctNotes.length === 0) {
      const defaultObs = state.lang === 'en' ?
        "During this period, the student practiced conversation and pronunciation drills. Speaking flow and listening comprehension remain strong and on track." :
        "Durante este período, o aluno praticou conversação livre e exercícios de escuta. A fluência verbal e a compreensão auditiva estão progredindo conforme o planejado.";
      
      const lines = doc.splitTextToSize(defaultObs, width - (margin * 2) - 8);
      lines.forEach(line => {
        doc.text(line, margin + 4, y);
        y += 5.5;
      });
      y += 4;
    } else {
      distinctNotes.forEach(n => {
        const lines = doc.splitTextToSize(`•  ${n}`, width - (margin * 2) - 8);
        lines.forEach(line => {
          doc.text(line, margin + 4, y);
          y += 5.5;
        });
      });
      y += 4;
    }
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.setTextColor(...secondaryColor);
    doc.text(state.lang === 'en' ? "4. Action Plan & Recommendations" : "4. Plano de Ação e Recomendações", margin, y);
    y += 4;
    doc.line(margin, y, width - margin, y);
    y += 6;
    
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(...textColor);
    
    const recs = state.lang === 'en' ? [
      "Vocabulary Reinforcement: Review vocabulary sheets and expression lists studied this month.",
      "Pronunciation Focus: Pay attention to linking sounds and silent letters during speaking exercises.",
      "Fixation Activities: Complete the recommended worksheets to solidify grammar structures."
    ] : [
      "Reforço de Vocabulário: Revisar as expressões e termos estudados nas aulas deste mês.",
      "Foco em Pronúncia: Atentar para a conexão de palavras (linking sounds) durante os diálogos.",
      "Atividades de Fixação: Concluir as tarefas recomendadas para consolidação gramatical."
    ];
    
    recs.forEach(r => {
      const lines = doc.splitTextToSize(`•  ${r}`, width - (margin * 2) - 8);
      lines.forEach(line => {
        doc.text(line, margin + 4, y);
        y += 5.5;
      });
    });
    
    y = height - 30;
    doc.setDrawColor(226, 232, 240);
    doc.line(margin, y, width - margin, y);
    y += 6;
    
    doc.setFont("helvetica", "italic");
    doc.setFontSize(8.5);
    doc.setTextColor(148, 163, 184);
    doc.text(state.lang === 'en' ? "Generated automatically by English Class System" : "Gerado automaticamente pelo English Class System", margin, y);
    doc.text(state.lang === 'en' ? "Page 1 of 1" : "Página 1 de 1", width - margin - 20, y);
    
    const filename = `${student.name.replace(/\s+/g, '_')}_Monthly_Report_${monthName}_${year}.pdf`;
    doc.save(filename);
    
  } catch (err) {
    alert((state.lang === 'en' ? "Error generating PDF: " : "Erro ao gerar PDF: ") + err.message);
  } finally {
    if (originalBtn && oldHtml) {
      originalBtn.disabled = false;
      originalBtn.innerHTML = oldHtml;
    }
  }
}
function payKey(sid, year, month){ return sid+'_'+year+'-'+String(month+1).padStart(2,'0'); }
function getPayStatus(sid, year, month){ return state.pagamentos[payKey(sid,year,month)] || 'pendente'; }
async function setPayStatus(sid, year, month, status){
  const k = payKey(sid,year,month);
  if(status==='pendente') delete state.pagamentos[k]; else state.pagamentos[k] = status;
  await write('pagamentos', state.pagamentos);
  renderFinanceiro();
}
function navFinanceiroMonth(delta){
  state.financeiroMonth = addMonths(state.financeiroMonth, delta);
  renderFinanceiro();
}
function ajusteKey(sid, year, month){ return sid+'_'+year+'-'+String(month+1).padStart(2,'0'); }
function hasAjuste(sid, year, month){ return Object.prototype.hasOwnProperty.call(state.financeiroAjustes, ajusteKey(sid,year,month)); }
function getValorFinal(sid, year, month, computed){
  const k = ajusteKey(sid,year,month);
  return hasAjuste(sid,year,month) ? state.financeiroAjustes[k] : computed;
}
function openEditValor(sid, year, month, computed){
  const s = studentById(sid); if(!s) return;
  const atual = getValorFinal(sid, year, month, computed);
  showModal(`
    <h3>${t('financeiro.editValue')}</h3>
    <div class="msub">${esc(s.name)} · ${MONTHS_FULL_CAP[month]} ${year}</div>
    <div class="banner" style="margin:0 0 14px">${t('financeiro.autoValue')}: <b>${fmtBRL(computed)}</b></div>
    <div class="field"><label>${t('financeiro.finalValue')}</label>
      <div class="al-money"><span>R$</span><input id="fn-valor-input" type="text" inputmode="decimal" value="${moneyToDisplay(atual)}" placeholder="0,00" oninput="formatCurrencyInput(this)"></div>
    </div>
    <div class="modal-acts">
      ${hasAjuste(sid,year,month)?`<button class="btn btn-ghost" onclick="clearValorAjuste('${sid}',${year},${month})">${t('financeiro.restore')}</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">${t('common.cancel')}</button>
      <button class="btn btn-primary" onclick="saveValorAjuste('${sid}',${year},${month})">${t('common.save')}</button>
    </div>`);
  setTimeout(()=>{ const i=document.getElementById('fn-valor-input'); if(i){ i.focus(); i.select(); } }, 50);
}
async function saveValorAjuste(sid, year, month){
  const raw = document.getElementById('fn-valor-input').value;
  if(raw==='') return;
  state.financeiroAjustes[ajusteKey(sid,year,month)] = parseCurrencyValue(raw);
  await write('financeiroAjustes', state.financeiroAjustes);
  closeModal(); renderFinanceiro();
}
async function clearValorAjuste(sid, year, month){
  delete state.financeiroAjustes[ajusteKey(sid,year,month)];
  await write('financeiroAjustes', state.financeiroAjustes);
  closeModal(); renderFinanceiro();
}

function renderFinanceiro(){
  const el = document.getElementById('v-financeiro');
  if(!el) return;
  const view = state.financeiroMonth || new Date();
  const year = view.getFullYear(), month = view.getMonth();
  const monthLabel = MONTHS_FULL_CAP[month]+' '+year;

  const summary = monthlyStatusSummary(year, month); // {sid:{p,f,c}}
  const ids = Object.keys(summary).sort((a,b)=>{
    const na=(studentById(a)||{}).name||'zzz', nb=(studentById(b)||{}).name||'zzz';
    return na.localeCompare(nb,'pt-BR',{sensitivity:'base'});
  });

  let total=0, recebido=0, pendente=0;
  const scheduled = countMonthlyClasses(year, month); // {sid: aulas previstas no mes inteiro, conforme a agenda}
  let projecao = 0;
  Object.keys(scheduled).forEach(sid=>{
    const s = studentById(sid);
    const price = (s && s.price!=null && s.price!=='') ? Number(s.price) : 0;
    projecao += scheduled[sid] * price;
  });
  const cards = ids.map(sid=>{
    const s = studentById(sid); const nm = s ? s.name : 'Aluno removido';
    const price = (s && s.price!=null && s.price!=='') ? Number(s.price) : 0;
    const aulasDadas = summary[sid].p;
    const computed = aulasDadas * price;
    const valor = getValorFinal(sid, year, month, computed);
    const ajustado = hasAjuste(sid, year, month);
    const status = getPayStatus(sid, year, month);
    total += valor;
    if(status==='pago') recebido += valor; else pendente += valor;
    return `<div class="fn-card card">
      <div class="fn-who">
        <div class="avatar" style="background:${studentColor(s)}">${esc(initials(nm))}</div>
        <div class="fn-who-txt">
          <div class="fn-nm">${esc(nm)}</div>
          <div class="fn-meta">${aulasDadas} ${aulasDadas===1?t('financeiro.classesGiven'):t('financeiro.classesGivenPl')}</div>
        </div>
      </div>
      <div class="fn-valorrow">
        <div class="fn-valor">${fmtBRL(valor)}${ajustado?`<span class="fn-adj-tag" title="Valor calculado: ${fmtBRL(computed)}">${t('financeiro.adjusted')}</span>`:''}</div>
        <button class="fn-editvalor" title="Ajustar valor (desconto)" onclick="openEditValor('${sid}',${year},${month},${computed})">✏️</button>
      </div>
      <div class="fn-pay">
        <button class="fn-btn pago ${status==='pago'?'on':''}" onclick="setPayStatus('${sid}',${year},${month},'pago')">${t('financeiro.paid')}</button>
        <button class="fn-btn pendente ${status==='pendente'?'on':''}" onclick="setPayStatus('${sid}',${year},${month},'pendente')">${t('financeiro.due')}</button>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="sec-head"><div>
      <h2>${t('financeiro.title')}</h2>
      <div class="sub">${t('financeiro.sub')}</div>
    </div></div>
    <div class="rp-monthbar">
      <button class="ag-nav" onclick="navFinanceiroMonth(-1)" title="Mês anterior">‹</button>
      <div class="rp-month-name">${monthLabel}</div>
      <button class="ag-nav" onclick="navFinanceiroMonth(1)" title="Próximo mês">›</button>
    </div>
    <div class="fn-totals">
      <div class="fn-tot fn-tot-total"><span class="fn-tot-lbl">${t('financeiro.total')}</span><span class="fn-tot-val">${fmtBRL(total)}</span></div>

function daysUntilDate(iso){
  if(!iso) return null;
  const [y,m,d] = iso.split('-').map(Number);
  const target = new Date(y, m-1, d);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((target - today)/86400000);
}
function fmtDateBR(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return d+'/'+m+'/'+y;
}
function safeMonthDate(y, m, d){ const dim = new Date(y, m+1, 0).getDate(); return new Date(y, m, Math.min(d,dim)); }
function occurrenceInMonth(d, year, month){
  if(!d.vencimento) return null;
  const [vy,vm,vd] = d.vencimento.split('-').map(Number);
  if(!d.recorrente){
    return (vy===year && (vm-1)===month) ? d.vencimento : null;
  }
  const startBoundary = new Date(vy, vm-1, 1);
  const target = new Date(year, month, 1);
  if(target < startBoundary) return null; // ainda não havia começado nesse mês
  return isoDate(safeMonthDate(year, month, vd));
}
function despesaPagaKey(id, year, month){ return id+'_'+year+'-'+String(month+1).padStart(2,'0'); }
function isDespesaPaga(id, year, month){ return !!state.despesasPagas[despesaPagaKey(id,year,month)]; }

async function onOrgDocUpload(e){

    const dataUrl = await new Promise((res,rej)=>{

    state.orgDocs.push({id:uid(), name:file.name, type:file.type, size:file.size, dataUrl, addedAt:new Date().toISOString()});

function onOrgPhoto(e){
  const file = e.target.files && e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const max = 420; let w = img.width, h = img.height;
      if(w>h && w>max){ h = Math.round(h*max/w); w = max; }
      else if(h>=w && h>max){ w = Math.round(w*max/h); h = max; }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      state.orgInfo.photo = c.toDataURL('image/jpeg',0.85);
      renderInfo();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function computeYearlyRecebido(year){
  const arr = [];
  for(let m=0; m<12; m++){
    const summary = monthlyStatusSummary(year, m);
    let recebido = 0;
    Object.keys(summary).forEach(sid=>{
      const s = studentById(sid);
      const price = (s && s.price!=null && s.price!=='') ? Number(s.price) : 0;
      const computed = summary[sid].p * price;
      const valor = getValorFinal(sid, year, m, computed);
      const status = getPayStatus(sid, year, m);
      if(status==='pago') recebido += valor;
    });
    arr.push(recebido);
  }
  return arr;
}

function parseBRLInput(raw){
  if(raw==null) return NaN;
  let s = String(raw).trim().replace(/[^\d.,-]/g,'');
  if(s==='') return NaN;
  if(s.includes(',') && s.includes('.')){
    s = s.replace(/\./g,'').replace(',', '.');
  } else if(s.includes(',')){
    s = s.replace(',', '.');
  }
  return Number(s);
}
async function saveDcAjuste(year, month){
  const raw = document.getElementById('dc-valor-input').value;
  if(raw==='' || raw==null) return;
  let num = parseBRLInput(raw);
  if(!Number.isFinite(num) || num<0){
    alert(t('alert.invalidAmount'));
    return;
  }
  if(num > 100000){
    confirmBox(t('declaracao.overLimit')+' (R$ '+num.toFixed(2).replace('.',',')+') '+t('declaracao.overLimitMsg'),
      `doSaveDcAjusteCapped(${year},${month})`, {yesLabel:t('declaracao.useMax'), icon:'💰', danger:false});
    return;
  }
  state.declaracaoAjustes[dcAjusteKey(year,month)] = num;
  await write('declaracaoAjustes', state.declaracaoAjustes);
  closeModal(); renderDeclaracao();
}
async function doSaveDcAjusteCapped(year, month){
  state.declaracaoAjustes[dcAjusteKey(year,month)] = 100000;
  await write('declaracaoAjustes', state.declaracaoAjustes);
  closeModal(); renderDeclaracao();
}
async function clearDcAjuste(year, month){

function computeYearlyHoras(year){
  const arr = [];
  for(let m=0; m<12; m++){
    const summary = monthlyStatusSummary(year, m);
    let aulas = 0;
    Object.values(summary).forEach(v=>{ aulas += v.p; });
    arr.push(aulas); // 1 aula = 1 hora
  }
  return arr;
}
function navStatsYear(delta){
  state.statsYear += delta;
  renderEstatisticas();
}
function statBarRow(i, val, maxVal, totalYear, colorPair, fmt){
  const pct = maxVal>0 ? Math.round((val/maxVal)*100) : 0;
  const pctYear = totalYear>0 ? Math.round((val/totalYear)*100) : 0;
  return `<div class="es-row">
    <span class="es-lbl" style="color:${colorPair.fg}">${MONTHS_SHORT[i]}</span>
    <div class="es-track"><div class="es-fill" style="width:${val?Math.max(pct,3):0}%;background:${colorPair.fg}"></div></div>
    <span class="es-val">${fmt(val)}</span>
    <span class="es-pct" style="color:${colorPair.fg};background:${colorPair.bg}">${pctYear}%</span>
  </div>`;
}
function renderEstatisticas(){
  const el = document.getElementById('v-estatisticas');
  if(!el) return;
  const year = state.statsYear || new Date().getFullYear();
  const now = new Date();
  const isCurYear = year === now.getFullYear();
  const curM = now.getMonth();

  const ganhosComputed = computeYearlyRecebido(year);
  const ganhos = ganhosComputed.map((c,i)=>getMonthValue(year,i,c));
  const horas = computeYearlyHoras(year);

  const totalGanhos = ganhos.reduce((a,b)=>a+b,0);
  const totalHoras = horas.reduce((a,b)=>a+b,0);
  const mesesComGanho = ganhos.filter(v=>v>0).length || 1;
  const mesesComHoras = horas.filter(v=>v>0).length || 1;
  const mediaGanho = totalGanhos / mesesComGanho;
  const mediaHoras = totalHoras / mesesComHoras;
  const maxGanho = Math.max(1, ...ganhos);
  const maxHoras = Math.max(1, ...horas);

  function pctChange(arr, idx){
    if(idx<=0) return null;
    const prev = arr[idx-1], cur = arr[idx];
    if(prev===0) return cur>0 ? 100 : null;
    return Math.round(((cur-prev)/prev)*100);
  }
  const ganhoChange = isCurYear ? pctChange(ganhos, curM) : null;
  const horaChange = isCurYear ? pctChange(horas, curM) : null;
  const changeBadge = (v)=>{
    if(v===null) return '';
    const up = v>=0;
    return `<span class="es-change ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(v)}% ${t('estatisticas.vsLastMonth')}</span>`;
  };

  el.innerHTML = `
    <div class="sec-head"><div>
      <h2>${t('estatisticas.title')}</h2>
      <div class="sub">${t('estatisticas.sub')}</div>
    </div></div>
    <div class="rp-monthbar">
      <button class="ag-nav" onclick="navStatsYear(-1)" title="${t('estatisticas.prevYear')}">‹</button>
      <div class="rp-month-name">${year}</div>
      <button class="ag-nav" onclick="navStatsYear(1)" title="${t('estatisticas.nextYear')}">›</button>
    </div>
    <div class="es-stats">
      <div class="es-stat es-stat-violet"><span class="es-stat-lbl">${t('estatisticas.annualEarnings')}</span><span class="es-stat-val">${fmtBRL(totalGanhos)}</span></div>
      <div class="es-stat es-stat-sky"><span class="es-stat-lbl">${t('estatisticas.avgEarnings')}</span><span class="es-stat-val">${fmtBRL(mediaGanho)}</span></div>
      <div class="es-stat es-stat-emerald"><span class="es-stat-lbl">${t('estatisticas.annualHours')}</span><span class="es-stat-val">${totalHoras}h</span></div>
      <div class="es-stat es-stat-amber"><span class="es-stat-lbl">${t('estatisticas.avgHours')}</span><span class="es-stat-val">${mediaHoras.toFixed(1)}h</span></div>
    </div>

    <div class="sec-head" style="margin-top:26px"><div>
      <h2 style="font-size:18px">${t('estatisticas.monthlyEarnings')}</h2>
      <div class="sub">${t('estatisticas.earningsSub')}</div>
    </div>${changeBadge(ganhoChange)}</div>
    <div class="card panel">
      <div class="es-chart">
        ${ganhos.map((v,i)=>statBarRow(i, v, maxGanho, totalGanhos, DC_MONTH_COLORS[i], fmtBRL)).join('')}
      </div>
    </div>

    <div class="sec-head" style="margin-top:26px"><div>
      <h2 style="font-size:18px">${t('estatisticas.monthlyHours')}</h2>
      <div class="sub">${t('estatisticas.hoursSub')}</div>
    </div>${changeBadge(horaChange)}</div>
    <div class="card panel">
      <div class="es-chart">
        ${horas.map((v,i)=>statBarRow(i, v, maxHoras, totalHoras, DC_MONTH_COLORS[i], h=>h+'h')).join('')}
      </div>
    </div>`;
}

  Object.keys(state.agendaRecurring).forEach(key=>{
    state.agendaRecurring[key] = state.agendaRecurring[key].filter(e=>e.studentId!==studentId);
    if(!state.agendaRecurring[key].length) delete state.agendaRecurring[key];
  });
  // Não apagar a chave do override mesmo se ficar vazia: uma semana específica
  // pode ter sido intencionalmente reduzida (ex: outro aluno excluído só naquela
  // semana) e isso precisa continuar valendo mesmo depois desta limpeza.
  Object.keys(state.agendaOverrides).forEach(key=>{
    state.agendaOverrides[key] = state.agendaOverrides[key].filter(e=>e.studentId!==studentId);
  });
}
function purgeStudentData(studentId){
  Object.keys(state.presenca).forEach(k=>{
    if(k.split('_')[2]===studentId) delete state.presenca[k];
  });
  Object.keys(state.pagamentos).forEach(k=>{
    if(k.split('_')[0]===studentId) delete state.pagamentos[k];
  });
  Object.keys(state.financeiroAjustes).forEach(k=>{
    if(k.split('_')[0]===studentId) delete state.financeiroAjustes[k];
  });
}
function purgeAllOrphanedStudentData(){
  const validIds = new Set(state.students.map(s=>s.id));
  let changed = false;
  const before = state.lessons.length;
  state.lessons = state.lessons.filter(l=>validIds.has(l.studentId));
  if(state.lessons.length !== before) changed = true;
  Object.keys(state.agendaRecurring).forEach(key=>{
    const before2 = state.agendaRecurring[key].length;
    state.agendaRecurring[key] = state.agendaRecurring[key].filter(e=>validIds.has(e.studentId));
    if(state.agendaRecurring[key].length !== before2) changed = true;
    if(!state.agendaRecurring[key].length){ delete state.agendaRecurring[key]; changed = true; }
  });
  Object.keys(state.agendaOverrides).forEach(key=>{
    const before2 = state.agendaOverrides[key].length;
    state.agendaOverrides[key] = state.agendaOverrides[key].filter(e=>validIds.has(e.studentId));
    if(state.agendaOverrides[key].length !== before2) changed = true;
  });
  Object.keys(state.presenca).forEach(k=>{
    const sid = k.split('_')[2];
    if(!validIds.has(sid)){ delete state.presenca[k]; changed = true; }
  });
  Object.keys(state.pagamentos).forEach(k=>{
    const sid = k.split('_')[0];
    if(!validIds.has(sid)){ delete state.pagamentos[k]; changed = true; }
  });
  Object.keys(state.financeiroAjustes).forEach(k=>{
    const sid = k.split('_')[0];
    if(!validIds.has(sid)){ delete state.financeiroAjustes[k]; changed = true; }
  });
  return changed;
}

function go(view){
  state.view=view;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.view===view));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('v-'+view).classList.add('on');
  if(view==='relatorio-mensal') renderRelatorioMensal();
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('nav').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(b && b.dataset.view) go(b.dataset.view);
});

  renderPresenca(); renderAgenda();
  renderRelatorio(); renderRelatorioMensal(); renderFinanceiro(); renderDespesas(); renderInfo(); renderDeclaracao(); renderEstatisticas();
  renderAuthGate();
}
