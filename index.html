<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>English Class System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#F6FAF6; --surface:#FFFFFF; --ink:#333333; --muted:#6B6B6E;
    --line:#E1EDE1; --line-2:#EEF5EC;
    --violet:#2F9E5D; --indigo:#62A580; --pink:#E2762B;
    --emerald:#16A34A; --emerald-bg:#EFF9F2;
    --amber:#D97706; --amber-bg:#FEF5E8;
    --sky:#B7550E; --sky-bg:#FBF0E4;
    --rose:#E11D48; --rose-bg:#FDEEF2;
    --slate:#64748B; --slate-bg:#F3F5F9;
    --grad:linear-gradient(120deg,#71C198 0%,#2F9E5D 46%,#EFA875 100%);
    --shadow:0 10px 30px -12px rgba(28,70,42,.22);
    --shadow-sm:0 4px 14px -8px rgba(28,70,42,.22);
    --radius:20px;
  }
  *{box-sizing:border-box}
  body.dark{
    --bg:#141F18; --surface:#1C2A21; --ink:#F0F0F0; --muted:#ABABAD;
    --line:#2B3D31; --line-2:#243528;
    --violet:#3FBE78; --indigo:#2E9E5E; --pink:#F0913F;
    --emerald:#34D399; --emerald-bg:#1E3A2B;
    --amber:#F0B429; --amber-bg:#3D3320;
    --sky:#E29B5C; --sky-bg:#3D2E1B;
    --rose:#FB7185; --rose-bg:#3A2028;
    --slate:#94A3B8; --slate-bg:#2A3138;
    --grad:linear-gradient(120deg,#2E9E5E 0%,#1E7F49 46%,#C2570F 100%);
    --shadow:0 10px 30px -12px rgba(0,0,0,.5);
    --shadow-sm:0 4px 14px -8px rgba(0,0,0,.5);
  }
  body.dark .card,body.dark .panel{background:var(--surface);border-color:var(--line)}
  body.dark input,body.dark select,body.dark textarea{background:#1C2A21;color:var(--ink);border-color:var(--line)}
  body.dark .modal{background:var(--surface)}
  body.dark .avatar{box-shadow:none}
  body.dark ::placeholder{color:#5E7365}
  body.dark .nav button.active{background:#233428}
  body.dark .al-money,body.dark .cp-add input,body.dark #cp-search,body.dark .search input,
  body.dark .field input,body.dark .field select,body.dark .field textarea{background:#1C2A21!important;color:var(--ink)}
  body.dark .al-money:focus-within,body.dark .cp-add input:focus,body.dark #cp-search:focus,
  body.dark .search input:focus,body.dark .field input:focus,body.dark .field select:focus,
  body.dark .field textarea:focus{background:#22332A!important}
  body.dark .ag-slot,body.dark .cp-item,body.dark .doc-row,body.dark .pn-today-chip,body.dark .tp-row,body.dark .ex-row{
    background:#1C2A21;border-color:var(--line)}
  body.dark .ag-slot:hover{background:#233428;border-color:#2E4536}
  body.dark .cp-item:hover,body.dark .tp-row:hover,body.dark .btn-ghost:hover,body.dark .ag-nav:hover,
  body.dark .org-photo-btn:hover,body.dark .ex-row:hover{background:#233428;border-color:#3A5C46}
  body.dark .cp-item.sel{background:#1E3A2B}
  body.dark .pr-topic-btn{background:#1C2A21;color:var(--muted)}
  body.dark .pr-topic-btn:hover{background:#233428;border-color:#3A5C46}
  body.dark .pr-topic-btn.has{background:#1E3A2B;color:#5FD98B;border-color:#2E4536}
  body.dark .pr-topic-btn.has:hover{background:#26463A}
  body.dark .cp-current{color:var(--muted)}
  body.dark .ex-confirm{background:#1C2A21;border-color:var(--line);color:var(--muted)}
  body.dark .ex-confirm:hover{border-color:#3FBE78;color:#5FD98B}
  body.dark .btn-ghost{background:#1C2A21;color:var(--violet);border-color:var(--line)}
  body.dark .painel-login-btn{background:#1C2A21;color:var(--ink);border-color:var(--line)}
  body.dark .painel-login-btn:hover{border-color:#3FBE78}
  body.dark .alu-tag,body.dark .chip-count,body.dark .ag-week-count,body.dark .ag-hourchip{
    background:#1E3A2B;color:#5FD98B}
  body.dark .ag-hourchip:hover{background:#26463470}
  body.dark .ag-hourchip.on{background:#2E9E5E;color:#fff}
  body.dark .pn-today-topic{background:#1E3A2B;color:#5FD98B}
  body.dark .pn-today-topic-none{background:#233428;color:var(--muted)}
  body.dark .info-group.ig-violet{background:#132A1B;border-color:#2B4A38}
  body.dark .info-group.ig-pink{background:#2E2015;border-color:#4A3420}
  body.dark .info-group.ig-sky{background:#10202B;border-color:#244056}
  body.dark .info-group.ig-emerald{background:#10261C;border-color:#245239}
  body.dark .info-group.ig-amber{background:#2E2712;border-color:#4A3D1A}
  body.dark .banner{background:#3D3320;color:#F0C767;border-color:#5A4A28}
  body.dark .banner-danger{background:#3A2028;color:#FB93A6;border-color:#5A2E3A}
  body.dark .desp-row-warn{background:#2E2712}
  body.dark .desp-row-danger{background:#3A2028}
  body.dark .contract-dl{background:#2E2015;border-color:#4A3420}
  body.dark .doc-row{border-color:#4A3420}
  body.dark .cf-icon{background:#3A2028}
  body.dark .org-photo-ring{box-shadow:none}
  body.dark .es-track,body.dark .rp-bar-track,body.dark .dc-track{background:#233428}
  body.dark .fn-editvalor,body.dark .dc-edit,body.dark .desp-edit,body.dark .tp-btn,body.dark .fn-invoice{
    background:#233428}
  body.dark .fn-editvalor:hover,body.dark .dc-edit:hover,body.dark .desp-edit:hover,body.dark .tp-btn:hover{
    background:#2E4536}
  body.dark .desp-del:hover,body.dark .alu-acts button.danger:hover,body.dark .tp-del:hover{
    background:#3A2028;color:#FB93A6}
  body.dark .desp-pago-btn{background:#1C2A21;border-color:var(--line);color:var(--muted)}
  body.dark .desp-pago-btn:hover{border-color:#3FBE78;color:#5FD98B}
  body.dark .field-hint,body.dark .msub,body.dark .empty{color:var(--muted)}
  body.dark .wa-link:hover{background:#1E3A2B}
  body.dark .count-pill{background:#233428;color:var(--muted)}
  body.dark .stat{color:#fff}
  body.dark .es-stat-lbl,body.dark .fn-tot-lbl,body.dark .dc-total-lbl{color:#fff}
  body.dark .theme-toggle{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18)!important}
  html,body{margin:0}
  body{
    font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.5;
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  h1,h2,h3{font-family:'Bricolage Grotesque',Inter,sans-serif;margin:0;letter-spacing:-.02em;line-height:1.1}
  button{font-family:inherit;cursor:pointer;border:0;background:none}
  input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
  :focus-visible{outline:3px solid #62A580;outline-offset:2px;border-radius:8px}

  /* ---------- layout: vertical sidebar + content ---------- */
  .layout{display:block}
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;flex:none;
    width:236px;background:var(--grad);overflow-y:auto;
    padding:26px 18px;display:flex;flex-direction:column;gap:26px;z-index:40
  }
  .content{margin-left:236px;min-height:100vh}
  .shell{max-width:1440px;margin:0 auto;padding:24px 40px 96px}

  .brand{display:flex;align-items:center;gap:12px;color:#fff}
  .mark{
    width:44px;height:44px;border-radius:13px;background:rgba(255,255,255,.16);
    display:grid;place-items:center;font-size:23px;backdrop-filter:blur(4px);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);flex:none;cursor:pointer;transition:.15s
  }
  .mark:hover{background:rgba(255,255,255,.3);transform:scale(1.05)}
  .emoji-section{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:16px 2px 9px}
  .emoji-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:7px}
  .emoji-cell{font-size:24px;padding:8px 0;border-radius:11px;background:#FCFCFF;border:1px solid var(--line);transition:.12s;line-height:1}
  .emoji-cell:hover{background:#EFF8F0;border-color:#D2EBD7;transform:scale(1.1)}
  .flag-cell{padding:6px}
  .flag-img{display:block;width:100%;border-radius:4px;overflow:hidden;line-height:0;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .flag-img svg{display:block;width:100%;height:auto}
  .brand-flag{display:block;width:28px;border-radius:4px;overflow:hidden;line-height:0;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .brand-flag svg{display:block;width:100%;height:auto}

  /* ---------- alunos list ---------- */
  .alu-list{display:flex;flex-direction:column;gap:6px}
  .alu-row{display:flex;align-items:center;gap:11px;padding:8px 14px;flex-wrap:nowrap}
  .alu-row .avatar{width:34px;height:34px;font-size:13px}
  .alu-name{flex:1.7;min-width:0;display:flex;align-items:center;gap:8px}
  .alu-nm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .alu-col{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--muted);font-size:12.5px;white-space:nowrap}
  .alu-empty{opacity:.35}
  .alu-col .alu-i{display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  .wa-link{display:inline-flex;align-items:center;vertical-align:middle;margin-left:3px;padding:3px;border-radius:8px;cursor:pointer;transition:transform .14s,background .14s}
  .wa-link svg{width:18px;height:18px;display:block}
  .wa-link:hover{transform:scale(1.12);background:#EEFBF4}
  .alu-tag{background:#EFF8F0;color:#62A580;font-weight:700;font-size:11.5px;padding:2px 8px;border-radius:8px}
  .alu-price{color:var(--emerald);font-weight:700}
  .alu-acts{display:flex;gap:5px;flex:none}
  .alu-acts button{width:28px;height:28px;border-radius:9px;font-size:13px;background:var(--line-2);transition:.14s;display:grid;place-items:center}
  .alu-acts button:hover{background:#EAF4EB}
  .alu-acts button.danger:hover{background:var(--rose-bg);color:var(--rose)}
  .stu-pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
  .stu-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
  .stu-ativo{background:var(--emerald-bg);color:var(--emerald)}
  .stu-trancado{background:var(--amber-bg);color:var(--amber)}
  .stu-cancelado{background:var(--rose-bg);color:var(--rose)}

  /* ---------- aluno form helpers ---------- */
  .field-2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
  .al-inline{display:flex;align-items:center;gap:12px}
  .al-inline input{flex:1}
  .al-age{font-weight:700;color:var(--violet);font-size:14px;white-space:nowrap;min-width:56px}
  .al-money{display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:12px;background:#FCFCFF;padding:0 13px;transition:.15s}
  .al-money:focus-within{border-color:#B1E0BF;box-shadow:0 0 0 4px #EFF8F0;background:#fff}
  .al-money span{font-weight:700;color:var(--muted)}
  .al-money input{border:0!important;background:transparent!important;box-shadow:none!important;padding:12px 0!important}

  /* ---------- presença ---------- */
  .pr-legend{display:flex;gap:18px;margin-bottom:14px;font-size:13px;color:var(--muted);flex-wrap:wrap}
  .pr-legend span{display:inline-flex;align-items:center;gap:7px}
  .pr-key{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:800}
  .pr-key.p{background:var(--emerald)} .pr-key.f{background:var(--rose)} .pr-key.c{background:var(--amber)}
  .pr-list{display:flex;flex-direction:column;gap:10px}
  .pr-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-left:4px solid transparent}
  .pr-row.pr-p{border-left-color:var(--emerald)}
  .pr-row.pr-f{border-left-color:var(--rose)}
  .pr-row.pr-c{border-left-color:var(--amber)}
  .pr-time{font-family:'Bricolage Grotesque';font-weight:800;font-size:15px;color:var(--violet);flex:none;width:52px}
  .pr-main{display:flex;align-items:center;gap:11px;flex:none;width:230px;min-width:0}
  .pr-nm{min-width:0}
  .pr-name{display:block;font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pr-mini-stats{display:flex;gap:5px;margin-top:3px}
  .pr-mini{font-size:10.5px;font-weight:800;padding:2px 6px;border-radius:6px;line-height:1.4}
  .pr-mini.p{background:var(--emerald-bg);color:var(--emerald)}
  .pr-mini.f{background:var(--rose-bg);color:var(--rose)}
  .pr-mini.c{background:var(--amber-bg);color:var(--amber)}
  .pr-content-cell{flex:1;min-width:110px;display:flex;flex-direction:column;gap:4px}
  .pr-topic-btn{width:100%;text-align:left;padding:9px 12px;border-radius:11px;border:1.5px dashed var(--line);
    background:#FCFCFF;color:var(--muted);font-size:13.5px;font-weight:600;cursor:pointer;transition:.14s;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pr-topic-btn.has{border-style:solid;border-color:#D2F0E2;color:#0E7A54;background:var(--emerald-bg)}
  .pr-topic-btn.has:hover{border-color:#BBE6D3;background:#E6F7EE}
  .pr-topic-btn:hover{border-color:#B1E0BF;background:#FCFEFC}
  .pr-warn{font-size:11.5px;color:var(--amber);font-weight:700}
  .cp-current{font-size:13px;color:var(--muted);margin-bottom:10px}
  .cp-clear{color:var(--rose);font-weight:600;font-size:12px;padding:2px 6px;border-radius:7px}
  .cp-clear:hover{background:var(--rose-bg)}
  .cp-list{max-height:280px;overflow:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .cp-item{text-align:left;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);
    display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;transition:.12s}
  .cp-item:hover{border-color:#B1E0BF;background:#FCFEFC}
  .cp-item.sel{border-color:var(--violet);background:#F0F9F2}
  .cp-title{font-size:13.5px;font-weight:600;color:var(--ink)}
  .cp-done{font-size:11px;font-weight:700;color:var(--amber);white-space:nowrap;flex:none}
  .cp-add{display:flex;gap:8px}
  .cp-add input{flex:1;padding:11px 13px;border-radius:12px;border:1.5px solid var(--line);background:#FCFCFF}
  .cp-add input:focus{border-color:#B1E0BF;outline:none;box-shadow:0 0 0 4px #EFF8F0;background:#fff}
  #cp-search{width:100%;padding:11px 13px;border-radius:12px;border:1.5px solid var(--line);background:#FCFCFF}
  #cp-search:focus{border-color:#B1E0BF;outline:none;box-shadow:0 0 0 4px #EFF8F0;background:#fff}
  .pr-status{display:flex;gap:6px;flex:none}
  .pr-btn{width:34px;height:34px;border-radius:10px;font-weight:800;font-size:13px;border:1.5px solid var(--line);
    background:#fff;color:var(--muted);transition:.13s}
  .pr-btn:hover{transform:translateY(-1px)}
  .pr-btn.p.on{background:var(--emerald);border-color:transparent;color:#fff}
  .pr-btn.f.on{background:var(--rose);border-color:transparent;color:#fff}
  .pr-btn.c.on{background:var(--amber);border-color:transparent;color:#fff}
  .pr-btn.p:hover{border-color:var(--emerald);color:var(--emerald)}
  .pr-btn.f:hover{border-color:var(--rose);color:var(--rose)}
  .pr-btn.c:hover{border-color:var(--amber);color:var(--amber)}
  .pr-btn.on:hover{color:#fff}

  /* ---------- relatório ---------- */
  .rp-monthbar{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:18px;position:relative}
  .rp-month-name{font-family:'Bricolage Grotesque';font-size:18px;font-weight:800;min-width:170px;text-align:center}
  .rp-legend{display:flex;gap:18px;margin-bottom:14px;font-size:13px;color:var(--muted);flex-wrap:wrap;justify-content:center}
  .rp-legend span{display:inline-flex;align-items:center;gap:7px}
  .rp-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .rp-dot.p{background:var(--emerald)} .rp-dot.f{background:var(--rose)} .rp-dot.c{background:var(--amber)}
  .rp-list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .rp-row{display:flex;flex-direction:column;gap:10px;padding:13px 14px}
  .rp-who{display:flex;align-items:center;gap:9px}
  .rp-who-txt{min-width:0}
  .rp-nm{font-weight:700;font-size:13px;line-height:1.25;white-space:normal;word-break:break-word}
  .rp-pct{font-size:11px;font-weight:700;color:var(--emerald);margin-top:1px}
  .rp-pct-none{color:var(--muted);font-weight:600}
  .rp-bars{display:flex;flex-direction:column;gap:5px}
  .rp-line{display:flex;align-items:center;gap:7px}
  .rp-lbl{font-size:9.5px;font-weight:700;width:44px;flex:none;color:var(--muted)}
  .rp-lbl.p{color:var(--emerald)} .rp-lbl.f{color:var(--rose)} .rp-lbl.c{color:var(--amber)}
  .rp-bar-track{flex:1;height:10px;background:var(--line-2);border-radius:6px;overflow:hidden}
  .rp-bar-fill{height:100%;border-radius:6px;transition:width .3s ease}
  .rp-bar-fill.p{background:linear-gradient(90deg,#71E0B8,#50B696)}
  .rp-bar-fill.f{background:linear-gradient(90deg,#FC9CAA,#EA617F)}
  .rp-bar-fill.c{background:linear-gradient(90deg,#FCD266,#E4A051)}
  .rp-bar-val{font-size:10px;font-weight:800;color:var(--ink);width:16px;flex:none;text-align:right}

  /* ---------- financeiro ---------- */
  .fn-totals{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .fn-tot{flex:1;min-width:150px;border-radius:16px;padding:16px 18px;color:#fff;display:flex;flex-direction:column;gap:4px;box-shadow:var(--shadow-sm)}
  .fn-tot-total{background:linear-gradient(135deg,#72C199,#62A580)}
  .fn-tot-recebido{background:linear-gradient(135deg,#72E1B8,#51B696)}
  .fn-tot-pendente{background:linear-gradient(135deg,#F4B279,#D48957)}
  .fn-tot-projecao{background:linear-gradient(135deg,#F8BB54,#E4A051)}
  .fn-tot-lbl{font-size:12.5px;font-weight:600;opacity:.92}
  .fn-tot-val{font-family:'Bricolage Grotesque';font-size:22px;font-weight:800}
  .fn-tot-sub{display:block;font-size:11px;font-weight:600;opacity:.85;margin-top:2px}
  .fn-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .fn-card{display:flex;flex-direction:column;gap:12px;padding:16px}
  .fn-who{display:flex;align-items:center;gap:10px}
  .fn-who-txt{min-width:0}
  .fn-nm{font-weight:700;font-size:14px;line-height:1.25;word-break:break-word}
  .fn-meta{font-size:12px;color:var(--muted);margin-top:1px}
  .fn-valorrow{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .fn-valor{font-family:'Bricolage Grotesque';font-size:22px;font-weight:800;color:var(--ink);display:flex;align-items:baseline;gap:7px}
  .fn-adj-tag{font-family:Inter;font-size:10px;font-weight:700;color:var(--amber);background:var(--amber-bg);padding:3px 7px;border-radius:7px}
  .fn-editvalor{width:28px;height:28px;border-radius:9px;background:var(--line-2);font-size:13px;flex:none;display:grid;place-items:center;transition:.13s}
  .fn-editvalor:hover{background:#EAF4EB}
  .fn-pay{display:flex;gap:8px}
  .fn-btn{flex:1;padding:8px 6px;border-radius:10px;font-size:12.5px;font-weight:700;border:1.5px solid var(--line);
    background:#fff;color:var(--muted);transition:.13s;text-align:center}
  .fn-btn:hover{transform:translateY(-1px)}
  .fn-btn.pago.on{background:var(--emerald);border-color:transparent;color:#fff}
  .fn-btn.pendente.on{background:var(--pink);border-color:transparent;color:#fff}
  .fn-btn.pago:hover{border-color:var(--emerald);color:var(--emerald)}
  .fn-btn.pendente:hover{border-color:var(--pink);color:var(--pink)}
  .fn-btn.on:hover{color:#fff}

  /* ---------- declaração mensal (lista de meses) ---------- */
  .dc-list{display:flex;flex-direction:column;gap:8px}
  .dc-item{display:flex;align-items:center;gap:13px;padding:11px 14px;transition:.14s}
  .dc-item:hover{transform:translateX(2px)}
  .dc-item.now{box-shadow:0 0 0 2px var(--dcfg) inset}
  .dc-ico{width:46px;height:38px;border-radius:10px;background:var(--dcbg);color:var(--dcfg);
    display:grid;place-items:center;font-weight:800;font-size:13px;flex:none}
  .dc-name{flex:1;min-width:0;font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .dc-nowtag{font-size:10.5px;font-weight:700;color:#fff;background:var(--violet);padding:2px 8px;border-radius:20px}
  .dc-adjtag{font-size:10.5px;font-weight:700;color:var(--amber);background:var(--amber-bg);padding:2px 8px;border-radius:20px}
  .dc-money{font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;color:var(--ink);flex:none}
  .dc-edit{width:32px;height:32px;border-radius:9px;background:var(--line-2);color:var(--muted);font-size:13px;
    display:grid;place-items:center;transition:.13s;flex:none}
  .dc-edit:hover{background:#EAF4EB;color:var(--violet)}
  .dc-total{margin-bottom:16px;background:linear-gradient(135deg,#51B696,#4FA089);color:#fff;border-radius:16px;
    padding:18px 22px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-sm)}
  .dc-total-lbl{font-size:13.5px;font-weight:600;opacity:.92}
  .dc-total-val{font-family:'Bricolage Grotesque';font-size:26px;font-weight:800}

  /* ---------- estatísticas ---------- */
  .es-stats{display:flex;gap:12px;flex-wrap:wrap}
  .es-stat{flex:1;min-width:150px;border-radius:16px;padding:16px 18px;color:#fff;display:flex;flex-direction:column;gap:4px;box-shadow:var(--shadow-sm)}
  .es-stat-violet{background:linear-gradient(135deg,#72C199,#62A580)}
  .es-stat-sky{background:linear-gradient(135deg,#74D1FA,#4F96BD)}
  .es-stat-emerald{background:linear-gradient(135deg,#72E1B8,#51B696)}
  .es-stat-amber{background:linear-gradient(135deg,#F8BB54,#E4A051)}
  .es-stat-lbl{font-size:12px;font-weight:600;opacity:.92}
  .es-stat-val{font-family:'Bricolage Grotesque';font-size:20px;font-weight:800}
  .es-change{font-size:12px;font-weight:700;padding:5px 10px;border-radius:9px;white-space:nowrap}
  .es-change.up{color:var(--emerald);background:var(--emerald-bg)}
  .es-change.down{color:var(--rose);background:var(--rose-bg)}
  .es-chart{display:flex;flex-direction:column;gap:9px}
  .es-row{display:flex;align-items:center;gap:10px}
  .es-lbl{font-size:11.5px;font-weight:800;width:32px;flex:none}
  .es-track{flex:1;height:14px;background:var(--line-2);border-radius:7px;overflow:hidden}
  .es-fill{height:100%;border-radius:7px;transition:width .35s ease;opacity:.85}
  .es-val{font-size:12px;font-weight:700;color:var(--ink);width:76px;flex:none;text-align:right}
  .es-pct{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:7px;width:40px;flex:none;text-align:center}
  .pr-datebar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .pr-date-mid{flex:1;text-align:center;font-family:'Bricolage Grotesque';font-size:16px;font-weight:800;text-transform:capitalize}
  .pr-todaytag{font-family:Inter;font-size:11px;font-weight:700;color:#fff;background:var(--violet);padding:2px 8px;border-radius:20px;vertical-align:middle;text-transform:lowercase;margin-left:6px}

  /* ---------- agenda ---------- */
  .ag-monthbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .ag-week-count{font-size:13px;font-weight:700;color:var(--violet);background:#EFF8F0;padding:8px 14px;border-radius:11px}
  .ag-nav{width:36px;height:36px;border-radius:11px;background:#fff;border:1.5px solid var(--line);font-size:17px;
    font-weight:700;color:var(--violet);display:grid;place-items:center;transition:.14s;flex:none}
  .ag-nav:hover{border-color:#B1E0BF;background:#FCFEFC}
  .ag-month-mid{flex:1;text-align:center}
  .ag-now{font-family:'Bricolage Grotesque';font-size:16px;font-weight:800;letter-spacing:-.01em;text-transform:capitalize}
  .ag-today{flex:none}
  .ag-grid-wrap{overflow-x:auto;padding:14px}
  .ag-grid{display:grid;gap:6px;min-width:560px}
  .ag-cell{display:flex;align-items:center;justify-content:center;min-height:34px}
  .ag-corner{background:transparent}
  .ag-colhead{color:#fff;font-weight:700;font-size:12.5px;border-radius:10px;padding:10px 4px;position:relative}
  .ag-dname{font-size:12.5px;font-weight:800;letter-spacing:.02em}
  .ag-today-col{box-shadow:0 0 0 2px #fff, 0 0 0 4px var(--violet)}
  .ag-hour{font-size:12px;font-weight:700;color:var(--muted);justify-content:flex-end;padding-right:8px}
  .ag-hour-actions{display:flex;gap:10px;margin-top:4px}
  .ag-hour-actions .btn{flex:1;justify-content:center}
  .ag-del{color:var(--rose);border-color:#F9DCE2}
  .ag-del:hover{background:var(--rose-bg);border-color:#F4C6CF}
  .ag-hours-current{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}
  .ag-hours-label{font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:9px}
  .ag-hours-chips{display:flex;flex-wrap:wrap;gap:7px}
  .ag-hourchip{font-size:13px;font-weight:700;color:var(--violet);background:#EFF8F0;border:1.5px solid transparent;padding:6px 11px;border-radius:9px;transition:.12s}
  .ag-hourchip:hover{background:#E4F3E6}
  .ag-hourchip.on{border-color:var(--violet);background:#fff}
  .ag-empty{color:var(--muted);font-size:13px}
  .ag-chip-mod{outline:2px dashed #6FBE87;outline-offset:1px}
  .ag-mod-flag{color:var(--violet);font-weight:700;font-size:12px}
  .ag-repeat-check{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--ink);margin-top:14px;cursor:pointer}
  .ag-repeat-check input{width:16px;height:16px;accent-color:var(--violet)}
  .ag-slot{background:#FCFCFC;border:1px solid var(--line-2);border-radius:10px;min-height:44px;padding:4px;
    display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;cursor:pointer;transition:.14s}
  .ag-slot:hover{background:#F6FBF7;border-color:#DCF1DF}
  .ag-plus{color:#C9C2E0;font-size:16px;font-weight:700}
  .ag-chip{font-size:11px;font-weight:700;color:#3D3560;padding:4px 8px;border-radius:8px;white-space:nowrap;
    max-width:100%;overflow:hidden;text-overflow:ellipsis}

  .ag-modal-list{display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .ag-modal-row{display:flex;flex-direction:column;gap:9px;
    padding:12px;border-radius:14px;background:#FCFCFF;border:1.5px solid var(--line)}
  .ag-modal-row-top{display:flex;align-items:center}
  .ag-modal-rm-group{display:flex;flex-direction:column;gap:7px}
  .ag-modal-rm{width:100%;font-size:13px;font-weight:700;color:var(--rose);padding:10px 12px;border-radius:10px;
    white-space:nowrap;border:1.5px solid var(--rose-bg);background:#fff;text-align:center}
  .ag-modal-rm:hover{background:var(--rose-bg)}
  .ag-modal-rm:active{transform:scale(.98)}
  .ag-modal-rm-all{background:var(--rose-bg)}
  .ag-modal-rm-all:hover{background:#FBD8E0}
  .brand h1{font-size:20px;font-weight:800;line-height:1.1}
  .brand p{margin:2px 0 0;font-size:12px;opacity:.82;font-weight:500;letter-spacing:.01em}

  .nav{display:flex;flex-direction:column;gap:8px}
  .nav button{
    color:#fff;opacity:.92;padding:12px 15px;border-radius:12px;font-size:14.5px;font-weight:600;
    display:flex;align-items:center;gap:11px;text-align:left;width:100%;
    background:rgba(255,255,255,.10);
    border-bottom:3px solid rgba(0,0,0,.20);
    box-shadow:0 1px 0 rgba(255,255,255,.18) inset, 0 3px 7px -3px rgba(0,0,0,.3);
    transform:translateY(0);
    transition:transform .09s ease-out, box-shadow .09s ease-out, border-bottom-width .09s ease-out, background .15s ease
  }
  .nav button .ico{font-size:16px;width:20px;text-align:center}
  .nav button:hover{opacity:1;background:rgba(255,255,255,.18)}
  .nav button:active{
    transform:translateY(2px);
    border-bottom-width:1px;
    box-shadow:0 1px 2px -1px rgba(0,0,0,.25) inset;
    color:#262626
  }
  .nav button.active{
    opacity:1;background:#fff;color:var(--violet);
    border-bottom:3px solid rgba(20,40,25,.18);
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 5px 12px -5px rgba(0,0,0,.4)
  }
  .nav button.active:hover{background:#fff}
  .nav button.active:active{
    transform:translateY(2px);
    border-bottom-width:1px;
    box-shadow:0 4px 8px -5px rgba(0,0,0,.3);
    color:var(--indigo)
  }
  /* modo escuro: nenhuma mudança de cor no clique, só o efeito 3D */
  body.dark .nav button:active{color:#fff}
  body.dark .nav button.active:active{color:var(--violet)}

  .theme-toggle{
    color:#fff;opacity:.9;padding:12px 15px;border-radius:12px;font-size:14.5px;font-weight:600;
    display:flex;align-items:center;gap:11px;transition:.18s;text-align:left;width:100%;
    background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.22)!important
  }
  .theme-toggle .ico{font-size:16px;width:20px;text-align:center}
  .theme-toggle:hover{opacity:1;background:rgba(255,255,255,.2)}
  .sidebar-toggles{display:flex;flex-direction:column;gap:8px}

  main{position:relative;z-index:2}
  .view{display:none;animation:rise .35s ease both}
  .view.on{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
  .sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:26px 2px 14px;flex-wrap:wrap}
  .view > .sec-head:first-child{margin-top:0}
  .sec-head h2{font-size:20px}
  .sec-head .sub{color:var(--muted);font-size:13.5px;margin-top:3px}
  .ano-letivo{margin-top:5px;font-size:13px;font-weight:700;color:var(--violet)}
  .pn-freq-panel{margin-top:20px}
  .pn-freq-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .pn-freq-list{display:flex;flex-direction:column;gap:8px}
  .pn-freq-row{
    display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;
    border:1px solid var(--line);background:var(--bg)
  }
  .pn-freq-hour{font-family:'Bricolage Grotesque';font-weight:800;font-size:13.5px;color:var(--violet);
    min-width:48px;flex:none}
  .pn-freq-avatar{width:32px;height:32px;font-size:12.5px;flex:none}
  .pn-freq-name{flex:1;min-width:0;font-weight:600;font-size:14px;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pn-freq-status{display:flex;gap:5px;flex:none}
  .pn-freq-status .pr-btn{width:30px;height:30px;font-size:11.5px}
  .painel-login-btn{
    display:inline-flex;align-items:center;gap:9px;align-self:flex-start;flex:none;
    background:#fff;border:1.5px solid var(--line);color:var(--ink);font-weight:700;font-size:13.5px;
    padding:9px 16px 9px 9px;border-radius:30px;box-shadow:var(--shadow-sm);transition:.14s
  }
  .painel-login-btn:hover{border-color:#B1E0BF;transform:translateY(-1px)}
  .painel-login-ico{
    width:30px;height:30px;border-radius:50%;background:var(--grad);color:#fff;
    display:grid;place-items:center;font-size:15px;flex:none
  }
  .pn-today{margin-top:14px}
  .pn-today-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .pn-today-list{display:flex;flex-wrap:wrap;gap:8px}
  .pn-today-chip{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);
    padding:7px 12px;border-radius:11px;font-size:13.5px;font-weight:600;color:var(--ink);box-shadow:var(--shadow-sm);flex-wrap:wrap}
  .pn-today-hour{font-family:'Bricolage Grotesque';font-weight:800;color:var(--violet);font-size:13px}
  .pn-today-dot{width:8px;height:8px;border-radius:50%;flex:none}
  .pn-today-topic{font-size:11.5px;font-weight:700;color:#0E7A54;background:var(--emerald-bg);padding:3px 9px;
    border-radius:8px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pn-today-topic-none{color:var(--muted);background:var(--line-2);font-weight:600}
  .pn-today-empty{font-size:13.5px;color:var(--muted)}

  /* ---------- org info form ---------- */
  .info-hero{display:flex;justify-content:center;padding:24px}
  .org-photo-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
  .org-photo-ring{width:126px;height:126px;border-radius:50%;background:var(--grad);display:grid;place-items:center;box-shadow:var(--shadow-sm)}
  .org-photo{
    width:112px;height:112px;border-radius:50%;background-color:#fff;background-size:cover;background-position:center;
    display:grid;place-items:center
  }
  .org-photo span{font-size:32px;opacity:.5}
  .org-photo-actions{display:flex;align-items:center;gap:10px}
  .org-photo-btn{cursor:pointer;font-size:13px;font-weight:600;color:var(--violet);background:#fff;border:1.5px solid var(--line);padding:9px 15px;border-radius:11px;transition:.14s}
  .org-photo-btn:hover{border-color:#B1E0BF;background:#FCFEFC}
  .org-photo-remove{font-size:12.5px;font-weight:600;color:var(--muted);padding:6px 8px;border-radius:9px}
  .org-photo-remove:hover{color:var(--rose);background:var(--rose-bg)}
  .org-actions{display:flex;align-items:center;gap:16px;margin:20px 2px 0}
  .org-saved{font-size:13.5px;font-weight:700;color:var(--emerald)}
  .contract-dl{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
    margin-top:18px;padding:16px 18px;border-radius:16px;background:#FEF7F2;border:1.5px solid #F9E5CE}
  .contract-dl-info{display:flex;align-items:center;gap:12px}
  .contract-dl-ico{font-size:26px;flex:none}
  .contract-dl-title{font-weight:700;font-size:14.5px;color:var(--ink)}
  .contract-dl-sub{font-size:12px;color:var(--muted);margin-top:1px}
  .contract-dl-btn{background:linear-gradient(135deg,#F4B279,#D48957)!important;white-space:nowrap;flex:none;
    text-decoration:none;color:#fff!important;box-shadow:0 8px 20px -8px rgba(194,87,15,.55)!important}

  .info-groups{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .info-group-full{margin-top:16px}
  .info-group{border-radius:18px;padding:18px 20px;border:1.5px solid transparent}
  .ig-head{display:flex;align-items:center;gap:9px;font-weight:800;font-size:14.5px;margin-bottom:14px}
  .ig-ico{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;font-size:15px;color:#fff;flex:none}
  .ig-violet{background:#F4FCF6;border-color:#DCF1DF}
  .ig-violet .ig-ico{background:linear-gradient(135deg,#72C199,#62A580)}
  .ig-pink{background:#FEF7F2;border-color:#F9E5CE}
  .ig-pink .ig-ico{background:linear-gradient(135deg,#F4B279,#D48957)}
  .ig-sky{background:#F4FAFE;border-color:#DCEEFC}
  .ig-sky .ig-ico{background:linear-gradient(135deg,#74D1FA,#4F96BD)}
  .ig-emerald{background:#F4FCF9;border-color:#D9F3E6}
  .ig-emerald .ig-ico{background:linear-gradient(135deg,#72E1B8,#51B696)}
  .ig-amber{background:#FEFAF3;border-color:#F8EAD0}
  .ig-amber .ig-ico{background:linear-gradient(135deg,#F8BB54,#E4A051)}

  .doc-upload-btn{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-size:13.5px;font-weight:700;
    color:#fff;background:linear-gradient(135deg,#F8BB54,#E4A051);padding:10px 16px;border-radius:11px;transition:.14s;
    box-shadow:0 6px 16px -8px rgba(217,119,6,.6)}
  .doc-upload-btn:hover{transform:translateY(-1px)}
  .doc-list{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  .doc-row{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid #F4EBD6;border-radius:12px;padding:10px 12px}
  .doc-ico{font-size:20px;flex:none}
  .doc-info{flex:1;min-width:0}
  .doc-name{font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .doc-meta{font-size:11.5px;color:var(--muted)}
  .doc-btn{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:14px;flex:none;transition:.13s;color:var(--muted)}
  .doc-btn:hover{background:var(--line-2)}
  .doc-del:hover{background:var(--rose-bg);color:var(--rose)}

  /* ---------- buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:13px;
    font-weight:700;font-size:14.5px;transition:.16s;white-space:nowrap
  }
  .btn-primary{background:var(--grad);color:#fff;box-shadow:0 8px 20px -8px rgba(30,127,73,.55)}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 24px -8px rgba(30,127,73,.65)}
  .btn-ghost{background:#fff;color:var(--violet);border:1.5px solid var(--line)}
  .btn-ghost:hover{border-color:#B1E0BF;background:#FCFEFC}
  .btn-sm{padding:7px 12px;font-size:13px;border-radius:10px}

  /* ---------- stats ---------- */
  .stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .stat{padding:20px;border-radius:18px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
  .stat-link{cursor:pointer;transition:transform .16s,box-shadow .16s}
  .stat-link:hover{transform:translateY(-3px);box-shadow:0 12px 24px -10px rgba(0,0,0,.35)}
  .stat-link:active{transform:translateY(-1px)}
  .stat .n{font-family:'Bricolage Grotesque';font-size:34px;font-weight:800;line-height:1}
  .stat .l{font-size:13px;font-weight:600;opacity:.92;margin-top:6px}
  .stat .em{position:absolute;right:12px;top:12px;font-size:26px;opacity:.35}
  .s-violet{background:linear-gradient(135deg,#72C199,#62A580)}
  .s-pink{background:linear-gradient(135deg,#F4B279,#D48957)}
  .s-amber{background:linear-gradient(135deg,#F8BB54,#E4A051)}
  .s-emerald{background:linear-gradient(135deg,#58CEA7,#51B696)}
  .s-sky{background:linear-gradient(135deg,#65C8A0,#569C7C)}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
  .panel{padding:20px}
  .panel h3{font-size:16px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .panel h3 .dot{width:9px;height:9px;border-radius:50%}

  /* ---------- lists ---------- */
  .row{display:flex;align-items:center;gap:13px;padding:11px 0;border-top:1px solid var(--line-2)}
  .row:first-of-type{border-top:0}
  .avatar{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;flex:none}
  .row .grow{flex:1;min-width:0}
  .row .grow b{font-weight:600;font-size:14.5px}
  .row .grow small{display:block;color:var(--muted);font-size:12.5px}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:26px 10px}

  /* ---------- toolbar ---------- */
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .search{flex:1;min-width:200px;position:relative}
  .search input{
    width:100%;padding:12px 14px 12px 40px;border-radius:13px;border:1.5px solid var(--line);
    background:#fff;transition:.15s
  }
  .search input:focus{border-color:#B1E0BF;outline:none;box-shadow:0 0 0 4px #EFF8F0}
  .search .mag{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .count-pill{font-size:13px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--line);padding:8px 12px;border-radius:11px}

  /* ---------- student cards ---------- */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
  .scard{padding:18px;position:relative;transition:.18s}
  .scard:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
  .scard .top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .scard .av{width:46px;height:46px;border-radius:14px;font-size:17px}
  .scard .nm{font-weight:700;font-size:15.5px;line-height:1.2}
  .scard .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
  .chip{font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:8px;display:inline-flex;align-items:center;gap:4px}

const _hz=(a,b,c)=>`<rect width="60" height="40" fill="${a}"/><rect y="13.33" width="60" height="13.34" fill="${b}"/><rect y="26.67" width="60" height="13.33" fill="${c}"/>`;
function _starPts(cx,cy,r){let p='';for(let i=0;i<10;i++){const a=Math.PI/5*i-Math.PI/2;const rr=i%2?r*0.4:r;p+=(cx+rr*Math.cos(a)).toFixed(1)+','+(cy+rr*Math.sin(a)).toFixed(1)+' ';}return p;}

function _stripesGR(){let s=`<rect width="60" height="40" fill="#0D5EAF"/>`;for(let i=1;i<9;i+=2)s+=`<rect y="${(i*40/9).toFixed(2)}" width="60" height="${(40/9).toFixed(2)}" fill="#fff"/>`;const q=40*5/9;s+=`<rect width="${q.toFixed(1)}" height="${q.toFixed(1)}" fill="#0D5EAF"/><rect y="${(q/2-40/18).toFixed(1)}" width="${q.toFixed(1)}" height="${(40/9).toFixed(2)}" fill="#fff"/><rect x="${(q/2-40/18).toFixed(1)}" width="${(40/9).toFixed(2)}" height="${q.toFixed(1)}" fill="#fff"/>`;return s;}

function maskPhoneBR(v){
  const d = (v||'').replace(/\D/g,'').slice(0,11);
  if(!d) return '';
  if(d.length<=2) return '('+d;
  if(d.length<=6) return `(${d.slice(0,2)}) ${d.slice(2)}`;
  if(d.length<=10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
  return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
}
function maskCpfCnpj(v){
  const d = (v||'').replace(/\D/g,'').slice(0,14);
  if(!d) return '';
  if(d.length<=11){
    // CPF: 000.000.000-00
    if(d.length<=3) return d;
    if(d.length<=6) return `${d.slice(0,3)}.${d.slice(3)}`;
    if(d.length<=9) return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6)}`;
    return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;
  }
  // CNPJ: 00.000.000/0000-00
  if(d.length<=5) return `${d.slice(0,2)}.${d.slice(2)}`;
  if(d.length<=8) return `${d.slice(0,2)}.${d.slice(2,5)}.${d.slice(5)}`;
  if(d.length<=12) return `${d.slice(0,2)}.${d.slice(2,5)}.${d.slice(5,8)}/${d.slice(8)}`;
  return `${d.slice(0,2)}.${d.slice(2,5)}.${d.slice(5,8)}/${d.slice(8,12)}-${d.slice(12)}`;
}
function ageFromDOB(dob){
  if(!dob) return null;
  const b = new Date(dob+'T00:00:00'); if(isNaN(b.getTime())) return null;
  const now = new Date();
  let a = now.getFullYear()-b.getFullYear();
  const m = now.getMonth()-b.getMonth();
  if(m<0 || (m===0 && now.getDate()<b.getDate())) a--;
  return (a>=0 && a<130) ? a : null;
}

function cleanupExpiredOverrides(){
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let changed = false;
  Object.keys(state.agendaOverrides).forEach(key=>{
    const dateISO = key.split('_')[0];
    const [y,m,d] = dateISO.split('-').map(Number);
    if(!y || !m || !d) return;
    const entryDate = new Date(y, m-1, d);
    const daysSince = Math.round((today - entryDate)/86400000);
    if(daysSince >= 1){
      delete state.agendaOverrides[key];
      changed = true;
    }
  });
  return changed;
}

  const first = (name||'').trim().split(/\s+/)[0] || '';

function openWA(url, ev){
  if(!url) return false;
  if(ev) ev.stopPropagation();
  // 1) tenta abrir em nova aba
  try{
    const w = window.open(url, '_blank', 'noopener,noreferrer');
    if(w){ if(ev) ev.preventDefault(); return false; }
  }catch(e){}
  // 2) tenta navegar a janela principal (fora do quadro)
  try{
    if(window.top && window.top !== window){ window.top.location.href = url; if(ev) ev.preventDefault(); return false; }
  }catch(e){}
  // 3) último recurso: copia o link e avisa
  try{
    if(navigator.clipboard) navigator.clipboard.writeText(url);
    alert(t('alert.waFailed')+'\n\n'+url);
    if(ev) ev.preventDefault();
    return false;
  }catch(e){}
  // 4) deixa o link nativo tentar
  return true;
}

let STORAGE_OK = true;
const mem = {};
async function read(key, fallback){
  try{
    if(SUPABASE_CONFIGURED && sb && sbUid){
      const { data, error } = await sb.from('app_data').select('value')
        .eq('user_id', sbUid).eq('key', key).maybeSingle();
      if(error) throw error;
      if(data && data.value != null) return data.value;
      throw new Error('empty');
    }
    if(!window.storage) throw new Error('no storage');
    const r = await window.storage.get(key, false);
    if(r && r.value != null) return JSON.parse(r.value);
    throw new Error('empty');
  }catch(e){
    await write(key, fallback);
    return fallback;
  }
}
async function write(key, val){
  try{
    if(SUPABASE_CONFIGURED && sb && sbUid){
      const { error } = await sb.from('app_data')
        .upsert({ user_id: sbUid, key: key, value: val, updated_at: new Date().toISOString() },
                { onConflict: 'user_id,key' });
      if(error) throw error;
      STORAGE_OK = true; mem[key] = val;
      return;
    }
    if(!window.storage) throw new Error('no storage');
    await window.storage.set(key, JSON.stringify(val), false);
    STORAGE_OK = true; mem[key] = val;
  }catch(e){
    STORAGE_OK = false; mem[key] = val;
  }
}

let authOk = false; // válido só para esta sessão da página (não fica salvo)
async function sha256(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function passwordIsStrong(pw){
  return /^[A-ZÀ-Ý]/.test(pw||'') && /\d/.test(pw||'');
}
function pwFieldHTML(id, value){
  return `<div class="pw-wrap">
    <input id="${id}" type="password" value="${esc(value||'')}">
    <button type="button" class="pw-toggle" onclick="togglePwVisibility('${id}')" tabindex="-1" title="${t('login.showPassword')}">👁️</button>
  </div>`;
}
function togglePwVisibility(id){
  const input = document.getElementById(id); if(!input) return;
  const btn = input.parentElement.querySelector('.pw-toggle');
  if(input.type === 'password'){ input.type = 'text'; if(btn) btn.textContent = '🙈'; }
  else{ input.type = 'password'; if(btn) btn.textContent = '👁️'; }
}
function normUser(v){ return (v||'').trim().toLowerCase().replace(/[^\w@.]/g,''); }
function validUsernames(){
  const o = state.orgInfo || {};
  const list = [];
  if(o.email) list.push(normUser(o.email));
  if(o.doc) list.push((o.doc||'').replace(/\D/g,''));
  return list;
}
let authView = 'login'; // 'login' | 'signup' | 'recover'
function setAuthView(v){ authView = v; renderAuthGate(); }
function renderAuthGate(){
  const el = document.getElementById('auth-gate');
  if(!el) return;
  const shouldShow = SUPABASE_CONFIGURED ? !authOk : (state.authHash && !authOk);
  if(!shouldShow){ el.classList.remove('on'); el.innerHTML=''; authView='login'; return; }
  el.classList.add('on');
  el.innerHTML = `
    <div class="auth-split-form">
      <div class="auth-card">${authCardHTML()}</div>
    </div>
    <div class="auth-split-img" style="background-image:url('${LOGIN_IMG_DATAURL}')">
      <div class="auth-img-overlay">
        <div class="auth-tagline">${t('login.tagline')}</div>
        <div class="auth-tagline-rule"></div>
      </div>
    </div>`;
  setTimeout(()=>{
    const first = el.querySelector('.auth-card input');
    if(first) first.focus();
    el.querySelectorAll('.auth-card input').forEach(i=>{
      i.onkeydown = e=>{
        if(e.key!=='Enter') return;
        if(authView==='login') attemptLogin();
        else if(authView==='signup') submitSignup();
        else submitRecover();
      };
    });
  }, 50);
}

/* credenciais lembradas ficam no navegador deste dispositivo */
function getRememberedCreds(){
  try{
    const raw = localStorage.getItem('ecs_remember');
    if(!raw) return {on:false, user:'', pass:''};
    const d = JSON.parse(atob(raw));
    return {on:true, user:d.u||'', pass:d.p||''};
  }catch(e){ return {on:false, user:'', pass:''}; }
}
function saveRememberedCreds(user, pass){
  try{ localStorage.setItem('ecs_remember', btoa(JSON.stringify({u:user, p:pass}))); }catch(e){}
}
function clearRememberedCreds(){
  try{ localStorage.removeItem('ecs_remember'); }catch(e){}
}
function handleRememberOnLogin(user, pass){
  const cb = document.getElementById('auth-remember');
  if(cb && cb.checked) saveRememberedCreds(user, pass);
  else clearRememberedCreds();
}
async function attemptLogin(){
  const errEl = document.getElementById('auth-err');
  if(errEl) errEl.textContent = '';
  const userRaw = document.getElementById('auth-user').value;
  const pass = document.getElementById('auth-pass').value||'';

  if(SUPABASE_CONFIGURED){
    const email = deriveAuthEmail(userRaw);
    if(!email || !pass){ if(errEl) errEl.textContent = t('login.invalid'); return; }
    try{
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if(error) throw error;
      handleRememberOnLogin(userRaw, pass);
      sbUid = data.user.id; sbEmail = data.user.email; authOk = true;
      renderAuthGate();
      await afterAuthReady();
    }catch(e){
      console.error('Supabase login error:', e);
      const msg = (e && e.message || '').toLowerCase();
      if(errEl){
        if(msg.includes('email not confirmed')) errEl.textContent = t('login.errNotConfirmed');
        else if(msg.includes('invalid login') || msg.includes('invalid credentials')) errEl.textContent = t('login.invalid') + (userRaw && !userRaw.includes('@') ? ' '+t('login.tryEmailHint') : '');
        else errEl.textContent = t('login.invalid') + ' (' + (e.message||'erro') + ')';
      }
    }
    return;
  }

  // modo local (sem Supabase configurado)
  const user = normUser(userRaw);
  const userDigits = (userRaw||'').replace(/\D/g,'');
  const valid = validUsernames();
  const userOk = valid.length && (valid.includes(user) || (userDigits && valid.includes(userDigits)));
  const passHash = await sha256(pass);
  if(userOk && passHash === state.authHash){
    handleRememberOnLogin(userRaw, pass);
    authOk = true;
    renderAuthGate();
    renderAll();
  }else{
    if(errEl) errEl.textContent = t('login.invalid');
  }
}
async function submitSignup(){
  const errEl = document.getElementById('auth-err');
  errEl.classList.remove('auth-ok');
  const name = (document.getElementById('su-name').value||'').trim();
  const email = (document.getElementById('su-email').value||'').trim().toLowerCase();
  const doc = (document.getElementById('su-doc').value||'').trim();
  const pass = document.getElementById('su-pass').value||'';
  const pass2 = document.getElementById('su-pass2').value||'';

  if(!name || !email || !doc){ errEl.textContent = t('login.errFillAll'); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ errEl.textContent = t('login.errEmailInvalid'); return; }
  if(!passwordIsStrong(pass)){ errEl.textContent = t('login.weak'); return; }
  if(pass !== pass2){ errEl.textContent = t('login.mismatch'); return; }

  if(SUPABASE_CONFIGURED){
    try{
      const { data, error } = await sb.auth.signUp({ email, password: pass });
      if(error) throw error;
      if(data.session && data.user){
        sbUid = data.user.id; sbEmail = data.user.email; authOk = true;
        renderAuthGate();
        await afterAuthReady();
        // guarda os dados essenciais no perfil da instituição

    }catch(e){
      const msg = (e && e.message || '').toLowerCase();

    }
    return;
  }

  // modo local
  state.orgInfo = Object.assign({}, state.orgInfo, {nome:name, email:email, doc:doc});
  await write('orgInfo', state.orgInfo);

async function submitRecover(){
  const errEl = document.getElementById('auth-err');
  errEl.classList.remove('auth-ok');

  if(SUPABASE_CONFIGURED){
    const email = (document.getElementById('rc-email').value||'').trim().toLowerCase();
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ errEl.textContent = t('login.errEmailInvalid'); return; }
    try{
      const { error } = await sb.auth.resetPasswordForEmail(email);
      if(error) throw error;
      errEl.textContent = t('login.recoverSent');
      errEl.classList.add('auth-ok');
    }catch(e){
      console.error('Supabase reset-password error:', e);
      const msg = (e && e.message || '').toLowerCase();
      if(msg.includes('rate limit') || msg.includes('too many')) errEl.textContent = t('login.errRateLimit');
      else errEl.textContent = t('login.recoverErr') + ' (' + (e.message||'erro') + ')';
    }
    return;
  }

  // modo local: confere credenciais cadastradas e define nova senha
  const userRaw = document.getElementById('rc-user').value||'';
  const pass = document.getElementById('rc-pass').value||'';
  const pass2 = document.getElementById('rc-pass2').value||'';
  const user = normUser(userRaw);
  const userDigits = userRaw.replace(/\D/g,'');
  const valid = validUsernames();
  const userOk = valid.length && (valid.includes(user) || (userDigits && valid.includes(userDigits)));
  if(!userOk){ errEl.textContent = t('login.recoverLocalErr'); return; }
  if(!passwordIsStrong(pass)){ errEl.textContent = t('login.weak'); return; }
  if(pass !== pass2){ errEl.textContent = t('login.mismatch'); return; }
  state.authHash = await sha256(pass);
  await write('authHash', state.authHash);
  errEl.textContent = t('login.resetOk');
  errEl.classList.add('auth-ok');
  setTimeout(()=>setAuthView('login'), 1200);
}

async function submitChangePassword(){
  const cur = document.getElementById('cp-current').value||'';
  const pw = document.getElementById('cp-new').value||'';
  const pw2 = document.getElementById('cp-new2').value||'';
  const msgEl = document.getElementById('cp-msg');
  if(!passwordIsStrong(pw)){ msgEl.textContent = t('login.weak'); return; }
  if(pw !== pw2){ msgEl.textContent = t('login.mismatch'); return; }

  if(SUPABASE_CONFIGURED){
    try{
      const { error: signInErr } = await sb.auth.signInWithPassword({ email: sbEmail, password: cur });
      if(signInErr) throw signInErr;
      const { error: updErr } = await sb.auth.updateUser({ password: pw });
      if(updErr) throw updErr;
      msgEl.textContent = t('login.saved'); msgEl.classList.add('auth-ok');
      setTimeout(closeModal, 900);
    }catch(e){
      msgEl.textContent = t('login.currentWrong');
    }
    return;
  }

  const curHash = await sha256(cur);
  if(curHash !== state.authHash){ msgEl.textContent = t('login.currentWrong'); return; }
  state.authHash = await sha256(pw);
  await write('authHash', state.authHash);
  msgEl.textContent = t('login.saved'); msgEl.classList.add('auth-ok');
  setTimeout(closeModal, 900);
}

const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmtBday(mmdd){
  if(!mmdd) return null;
  const [m,d] = mmdd.split('-').map(Number);
  if(!m||!d) return null;
  return d+' de '+MONTHS[m-1];
}
function daysUntilBday(mmdd){
  if(!mmdd) return Infinity;
  const [m,d] = mmdd.split('-').map(Number);
  const now = new Date(); const y = now.getFullYear();
  let next = new Date(y, m-1, d);
  const today = new Date(y, now.getMonth(), now.getDate());
  if(next < today) next = new Date(y+1, m-1, d);
  return Math.round((next - today)/86400000);
}
function fmtDateLong(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-').map(Number);
  return d+' de '+MONTHS_FULL[m-1]+' de '+y;
}

const DAYKEY_BY_GETDAY = ['dom','seg','ter','qua','qui','sex','sab'];
function presKey(iso,h,sid){ return iso+'_'+h+'_'+sid; }
function getPres(iso,h,sid){ return state.presenca[presKey(iso,h,sid)] || {}; }
function countMonthlyClasses(year, month){
  const counts = {};
  const daysInMonth = new Date(year, month+1, 0).getDate();
  for(let d=1; d<=daysInMonth; d++){
    const dt = new Date(year, month, d);
    const iso = isoDate(dt);
    const dk = DAYKEY_BY_GETDAY[dt.getDay()];
    state.agendaHours.forEach(h=>{
      effectiveEntries(iso, dk, h).forEach(e=>{
        const s = studentById(e.studentId);
        if(s && s.startDate && iso < s.startDate) return; // antes do início do curso do aluno
        counts[e.studentId] = (counts[e.studentId]||0)+1;
      });
    });
  }
  return counts;
}
function monthlyStatusSummary(year, month){
  const mk = year+'-'+String(month+1).padStart(2,'0');
  const sum = {};
  Object.keys(state.presenca).forEach(k=>{
    if(k.slice(0,7)!==mk) return;
    const rec = state.presenca[k]; if(!rec.status) return;
    const parts = k.split('_');
    const dateISO = parts[0], sid = parts[2];
    const s = studentById(sid);
    if(s && s.startDate && dateISO < s.startDate) return; // antes do início do curso do aluno
    if(!sum[sid]) sum[sid] = {p:0,f:0,c:0};
    if(rec.status==='p') sum[sid].p++;
    else if(rec.status==='f') sum[sid].f++;
    else if(rec.status==='c') sum[sid].c++;
  });
  return sum;
}

  const dayName = t(dayKeysArr[view.getDay()]);
  const isToday = iso === isoDate(new Date());
  const dateLabel = `${dayName}, ${fmtLongDate(view.getDate(), view.getMonth(), view.getFullYear())}`;

      rows.push({hour:h, studentId:e.studentId});

  const monthCount = countMonthlyClasses(view.getFullYear(), view.getMonth());
  const monthStatus = monthlyStatusSummary(view.getFullYear(), view.getMonth());

  const body = rows.length ? rows.map(r=>{
    const s = studentById(r.studentId);
    const nm = s ? s.name : 'Aluno removido';

    const btn = (code,label,cls)=>`<button class="pr-btn ${cls} ${pr.status===code?'on':''}" title="${label}" onclick="setPresStatus('${iso}','${r.hour}','${r.studentId}','${code}')">${code.toUpperCase()}</button>`;
    return `<div class="pr-row card ${pr.status?('pr-'+pr.status):''}">
      <div class="pr-time">${r.hour}</div>

        <div class="avatar" style="background:${s?s.color:'#94A3B8'}">${esc(initials(nm))}</div>
        <div class="pr-nm">
          <span class="pr-name">${esc(nm)}</span>

            <span class="pr-mini f" title="Faltas no mês">F ${ms.f}</span>
            <span class="pr-mini c" title="Cancelamentos no mês">C ${ms.c}</span>

        </div>

      <div class="pr-content-cell">
        <button class="pr-topic-btn ${pr.content?'has':''}" onclick="openContentPicker('${iso}','${r.hour}','${r.studentId}')">
          ${pr.content?esc(pr.content):t('presenca.chooseTopic')}</button>
        ${hist.length?`<div class="pr-warn">⚠️ Aula já dada em ${hist.map(fmtDM).join(', ')}</div>`:''}
      </div>
      <div class="pr-status">${btn('p',t('presenca.pres'),'p')}${btn('f',t('presenca.abs'),'f')}${btn('c',t('presenca.cancel'),'c')}</div>
    </div>`;
  }).join('') : `<div class="card panel"><div class="empty" style="padding:44px 16px">
      <div style="font-size:40px;margin-bottom:10px">📋</div>
      ${t('presenca.noClasses')}<br>${t('presenca.noClassesCta')}

  el.innerHTML = `

    </div></div>

      <div class="pr-date-mid">${dateLabel}${isToday?` <span class="pr-todaytag">${t('presenca.today')}</span>`:''}</div>
      <button class="ag-nav" onclick="navPresencaDay(1)" title="Próximo dia">›</button>
      ${isToday?'':`<button class="btn btn-ghost btn-sm" onclick="presencaToday()">${t('presenca.goToday')}</button>`}
    </div>
    ${rows.length ? `<div class="pr-legend">
      <span><b class="pr-key p">P</b> ${t('presenca.pres')}</span>

async function setPresStatus(iso,h,sid,status){
  const k = presKey(iso,h,sid);
  const cur = state.presenca[k] || {};
  cur.status = (cur.status===status) ? '' : status;
  if(!cur.status && !cur.content) delete state.presenca[k]; else state.presenca[k]=cur;
  await write('presenca', state.presenca);
  renderPresenca();
  renderPainel();

function fmtDM(iso){ const p=iso.split('-'); return p[2]+'/'+p[1]; }
function fmtDMY(iso){ const p=iso.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function topicHistoryForStudent(sid, title, excludeKey){
  const dates = [];
  Object.keys(state.presenca).forEach(k=>{
    if(k===excludeKey) return;
    const parts = k.split('_');           // [date, hour, sid]
    if(parts[2]!==sid) return;
    const rec = state.presenca[k];
    if(rec.content && rec.content===title) dates.push(parts[0]);
  });
  return [...new Set(dates)].sort();
}

let pendingAssign = null;
async function assignContent(iso, hour, sid, title){
  if(title){
    const key = presKey(iso, hour, sid);
    const hist = topicHistoryForStudent(sid, title, key);
    if(hist.length){
      const s = studentById(sid); const nm = s?s.name:t('presenca.theStudent');
      pendingAssign = {iso, hour, sid, title};
      confirmBox(nm+' '+t('presenca.alreadyTaught')+' "'+title+'". '+t('presenca.givenOn')+': '+hist.map(fmtDM).join(', ')+'. '+t('presenca.registerAnyway'),
        'confirmPendingAssign()', {yesLabel:t('presenca.registerAnywayBtn'), icon:'⚠️'});
      return;
    }
  }
  await doAssignContent(iso, hour, sid, title);
}
async function confirmPendingAssign(){
  if(!pendingAssign) return;
  const {iso, hour, sid, title} = pendingAssign;
  pendingAssign = null;
  await doAssignContent(iso, hour, sid, title);
}
async function doAssignContent(iso, hour, sid, title){
  const key = presKey(iso, hour, sid);
  const cur = state.presenca[key] || {};
  cur.content = title;
  if(!cur.status && !title) delete state.presenca[key]; else state.presenca[key]=cur;
  await write('presenca', state.presenca);
  closeModal(); renderPresenca();
}
async function addManualTopic(iso, hour, sid){
  const inp = document.getElementById('cp-new');
  const title = (inp?inp.value:'').trim();
  if(!title) return;
  if(!state.topics.some(t=>t.title.toLowerCase()===title.toLowerCase())){
    state.topics.unshift({id:uid(), title, done:false});
    await write('topics', state.topics);
  }
  assignContent(iso, hour, sid, title);
}

function delHourFromInput(){
  const v = document.getElementById('ag-hour-input').value;
  if(!v) return;
  if(!state.agendaHours.includes(v)){ alert(t('alert.hourNotFound')+' '+v+' '+t('alert.hourNotFoundEnd')); return; }
  const used = Object.keys(state.agendaRecurring).some(k=>k.endsWith('_'+v) && state.agendaRecurring[k].length)
            || Object.keys(state.agendaOverrides).some(k=>k.endsWith('_'+v) && state.agendaOverrides[k].length);

    confirmBox(t('agenda.hourInUse')+' '+v+'. '+t('agenda.deleteHourAnyway'), `doDelHour('${v}')`);

  doDelHour(v);

  openManageHours(v);

function openAgendaSlot(dateISO, dayKey, hour){
  const [y,m,dd] = dateISO.split('-').map(Number);
  const dt = new Date(y, m-1, dd);
  const dayKeys = ['agenda.sun','agenda.mon','agenda.tue','agenda.wed','agenda.thu','agenda.fri','agenda.sat'];
  const dayName = t(dayKeys[dt.getDay()]);
  const label = state.lang==='en' ? `${dayName}, ${monthFull(m-1)} ${dd}` : `${dayName}, ${dd} de ${monthFull(m-1).toLowerCase()}`;
  const entries = effectiveEntries(dateISO, dayKey, hour);
  const modified = hasOverride(dateISO, hour);
  const sorted = [...state.students].sort((a,b)=>a.name.localeCompare(b.name,'pt-BR',{sensitivity:'base'}));
  const already = new Set(entries.map(e=>e.studentId));
  const opts = [`<option value="">${t('agenda.chooseStudent')}</option>`]
    .concat(sorted.filter(s=>!already.has(s.id)).map(s=>`<option value="${s.id}">${esc(s.name)}</option>`)).join('');
  showModal(`
    <h3>${label} · ${hour}</h3>
    <div class="msub">${t('agenda.confirmStudents')}${modified?` <span class="ag-mod-flag">${t('agenda.weekModified')}</span>`:''}</div>
    ${entries.length ? `<div class="ag-modal-list">${entries.map(e=>{
      const st=studentById(e.studentId); const nm = st?st.name:(e.name||'Aluno removido');
      return `<div class="ag-modal-row">
        <div class="ag-modal-row-top">
          <span class="ag-chip" style="background:${pastelFor(e.studentId||nm)}">${esc(nm)}</span>
        </div>
        <div class="ag-modal-rm-group">
          <button class="ag-modal-rm" onclick="removeAgendaEntry('${dateISO}','${dayKey}','${hour}','${e.studentId}','week')">🗑️ ${t('agenda.slotRemoveWeek')}</button>
          <button class="ag-modal-rm ag-modal-rm-all" onclick="removeAgendaEntry('${dateISO}','${dayKey}','${hour}','${e.studentId}','all')">🗑️ ${t('agenda.slotRemoveAll')}</button>
        </div>
      </div>`;
    }).join('')}</div>` : `<div class="empty" style="padding:14px 0">${t('agenda.slotNoStudents')}</div>`}
    ${sorted.length ? `
    <div class="field" style="margin-top:16px"><label>${t('agenda.addStudentLabel')}</label>
      <select id="ag-student">${opts}</select></div>
    <label class="ag-repeat-check">
      <input type="radio" name="ag-repeat-mode" value="repeat" checked> ${t('agenda.repeatWeekly')}
    </label>
    <label class="ag-repeat-check">
      <input type="radio" name="ag-repeat-mode" value="once"> ${t('agenda.onlyThisWeek')}
    </label>
    <div class="modal-acts">
      <button class="btn btn-ghost" onclick="closeModal()">${t('common.close')}</button>
      <button class="btn btn-primary" onclick="addAgendaEntry('${dateISO}','${dayKey}','${hour}')">${t('agenda.addStudent')}</button>
    </div>` : `<div class="banner">${t('agenda.registerCta')}</div>
    <div class="modal-acts"><button class="btn btn-ghost" onclick="closeModal()">${t('common.close')}</button></div>`}`);
}
async function addAgendaEntry(dateISO, dayKey, hour){
  const sel = document.getElementById('ag-student');
  const studentId = sel ? sel.value : '';
  if(!studentId) return;
  const repeatEl = document.querySelector('input[name="ag-repeat-mode"]:checked');
  const repeat = !repeatEl || repeatEl.value === 'repeat';
  const recKey = dayKey+'_'+hour;
  const ovKey = dateISO+'_'+hour;
  if(repeat){
    if(!state.agendaRecurring[recKey]) state.agendaRecurring[recKey] = [];
    state.agendaRecurring[recKey].push({studentId});
    await write('agendaRecurring', state.agendaRecurring);
    // se esta semana específica já tinha sido alterada, refletir a adição nela também
    if(Object.prototype.hasOwnProperty.call(state.agendaOverrides, ovKey)){
      state.agendaOverrides[ovKey].push({studentId});
      await write('agendaOverrides', state.agendaOverrides);
    }
  }else{
    if(!Object.prototype.hasOwnProperty.call(state.agendaOverrides, ovKey)){
      state.agendaOverrides[ovKey] = (state.agendaRecurring[recKey] || []).slice();
    }
    state.agendaOverrides[ovKey].push({studentId});
    await write('agendaOverrides', state.agendaOverrides);
  }
  closeModal(); renderAgenda();
}
async function removeAgendaEntry(dateISO, dayKey, hour, studentId, scope){
  const recKey = dayKey+'_'+hour;
  const ovKey = dateISO+'_'+hour;
  if(scope==='all'){
    state.agendaRecurring[recKey] = (state.agendaRecurring[recKey]||[]).filter(e=>e.studentId!==studentId);
    if(!state.agendaRecurring[recKey].length) delete state.agendaRecurring[recKey];
    await write('agendaRecurring', state.agendaRecurring);
  }else{
    if(!Object.prototype.hasOwnProperty.call(state.agendaOverrides, ovKey)){
      state.agendaOverrides[ovKey] = (state.agendaRecurring[recKey] || []).slice();
    }
    state.agendaOverrides[ovKey] = state.agendaOverrides[ovKey].filter(e=>e.studentId!==studentId);
    await write('agendaOverrides', state.agendaOverrides);
  }
  closeModal(); renderAgenda();
}

function renderFinanceiro(){
  const el = document.getElementById('v-financeiro');
  if(!el) return;
  const view = state.financeiroMonth || new Date();
  const year = view.getFullYear(), month = view.getMonth();
  const monthLabel = MONTHS_FULL_CAP[month]+' '+year;

  const summary = monthlyStatusSummary(year, month); // {sid:{p,f,c}}
  const ids = Object.keys(summary).sort((a,b)=>{
    const na=(studentById(a)||{}).name||'zzz', nb=(studentById(b)||{}).name||'zzz';
    return na.localeCompare(nb,'pt-BR',{sensitivity:'base'});
  });

  let total=0, recebido=0, pendente=0;
  const scheduled = countMonthlyClasses(year, month); // {sid: aulas previstas no mes inteiro, conforme a agenda}
  let projecao = 0;
  Object.keys(scheduled).forEach(sid=>{
    const s = studentById(sid);
    const price = (s && s.price!=null && s.price!=='') ? Number(s.price) : 0;
    projecao += scheduled[sid] * price;
  });
  const cards = ids.map(sid=>{
    const s = studentById(sid); const nm = s ? s.name : 'Aluno removido';
    const price = (s && s.price!=null && s.price!=='') ? Number(s.price) : 0;
    const aulasDadas = summary[sid].p;
    const computed = aulasDadas * price;
    const valor = getValorFinal(sid, year, month, computed);
    const ajustado = hasAjuste(sid, year, month);
    const status = getPayStatus(sid, year, month);
    total += valor;
    if(status==='pago') recebido += valor; else pendente += valor;
    return `<div class="fn-card card">
      <div class="fn-who">
        <div class="avatar" style="background:${s?s.color:'#94A3B8'}">${esc(initials(nm))}</div>
        <div class="fn-who-txt">
          <div class="fn-nm">${esc(nm)}</div>
          <div class="fn-meta">${aulasDadas} ${aulasDadas===1?t('financeiro.classesGiven'):t('financeiro.classesGivenPl')}</div>
        </div>
      </div>
      <div class="fn-valorrow">
        <div class="fn-valor">${fmtBRL(valor)}${ajustado?`<span class="fn-adj-tag" title="Valor calculado: ${fmtBRL(computed)}">${t('financeiro.adjusted')}</span>`:''}</div>
        <button class="fn-editvalor" title="Ajustar valor (desconto)" onclick="openEditValor('${sid}',${year},${month},${computed})">✏️</button>
      </div>
      <div class="fn-pay">
        <button class="fn-btn pago ${status==='pago'?'on':''}" onclick="setPayStatus('${sid}',${year},${month},'pago')">${t('financeiro.paid')}</button>
        <button class="fn-btn pendente ${status==='pendente'?'on':''}" onclick="setPayStatus('${sid}',${year},${month},'pendente')">${t('financeiro.due')}</button>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="sec-head"><div>
      <h2>${t('financeiro.title')}</h2>
      <div class="sub">${t('financeiro.sub')}</div>
    </div></div>
    <div class="rp-monthbar">
      <button class="ag-nav" onclick="navFinanceiroMonth(-1)" title="Mês anterior">‹</button>
      <div class="rp-month-name">${monthLabel}</div>
      <button class="ag-nav" onclick="navFinanceiroMonth(1)" title="Próximo mês">›</button>
    </div>
    <div class="fn-totals">
      <div class="fn-tot fn-tot-total"><span class="fn-tot-lbl">${t('financeiro.total')}</span><span class="fn-tot-val">${fmtBRL(total)}</span></div>
      <div class="fn-tot fn-tot-recebido"><span class="fn-tot-lbl">${t('financeiro.received')}</span><span class="fn-tot-val">${fmtBRL(recebido)}</span></div>
      <div class="fn-tot fn-tot-pendente"><span class="fn-tot-lbl">${t('financeiro.pending')}</span><span class="fn-tot-val">${fmtBRL(pendente)}</span></div>
      <div class="fn-tot fn-tot-projecao"><span class="fn-tot-lbl">${t('financeiro.projection')}</span><span class="fn-tot-val">${fmtBRL(projecao)}</span><span class="fn-tot-sub">${Object.values(scheduled).reduce((a,b)=>a+b,0)} ${t('financeiro.projectionHint')}</span></div>
    </div>
    ${ids.length ? `<div class="fn-grid">${cards}</div>`
      : `<div class="card panel"><div class="empty" style="padding:44px 16px">
          <div style="font-size:40px;margin-bottom:10px">💰</div>
          ${t('financeiro.noData')} ${monthLabel}.<br>${t('financeiro.noDataCta')}
        </div></div>`}`;
}

const TIPO_DESPESA = {
  material: {key:'despesas.material', cls:'desp-material'},
  servico:  {key:'despesas.service',  cls:'desp-servico'},
  outro:    {key:'despesas.other',    cls:'desp-outro'}

function daysUntilDate(iso){
  if(!iso) return null;
  const [y,m,d] = iso.split('-').map(Number);
  const target = new Date(y, m-1, d);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((target - today)/86400000);
}
function fmtDateBR(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return d+'/'+m+'/'+y;
}
function safeMonthDate(y, m, d){ const dim = new Date(y, m+1, 0).getDate(); return new Date(y, m, Math.min(d,dim)); }
function occurrenceInMonth(d, year, month){
  if(!d.vencimento) return null;
  const [vy,vm,vd] = d.vencimento.split('-').map(Number);
  if(!d.recorrente){
    return (vy===year && (vm-1)===month) ? d.vencimento : null;
  }
  const startBoundary = new Date(vy, vm-1, 1);
  const target = new Date(year, month, 1);
  if(target < startBoundary) return null; // ainda não havia começado nesse mês
  return isoDate(safeMonthDate(year, month, vd));
}
function despesaPagaKey(id, year, month){ return id+'_'+year+'-'+String(month+1).padStart(2,'0'); }
function isDespesaPaga(id, year, month){ return !!state.despesasPagas[despesaPagaKey(id,year,month)]; }

  if(state.despesasPagas[k]) delete state.despesasPagas[k]; else state.despesasPagas[k] = true;

async function onOrgDocUpload(e){

    state.orgDocs.push({id:uid(), name:file.name, type:file.type, size:file.size, dataUrl, addedAt:new Date().toISOString()});

function onOrgPhoto(e){
  const file = e.target.files && e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const max = 420; let w = img.width, h = img.height;
      if(w>h && w>max){ h = Math.round(h*max/w); w = max; }
      else if(h>=w && h>max){ w = Math.round(w*max/h); h = max; }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      state.orgInfo.photo = c.toDataURL('image/jpeg',0.85);
      renderInfo();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function computeYearlyRecebido(year){
  const arr = [];
  for(let m=0; m<12; m++){
    const summary = monthlyStatusSummary(year, m);
    let recebido = 0;
    Object.keys(summary).forEach(sid=>{
      const s = studentById(sid);
      const price = (s && s.price!=null && s.price!=='') ? Number(s.price) : 0;
      const computed = summary[sid].p * price;
      const valor = getValorFinal(sid, year, m, computed);
      const status = getPayStatus(sid, year, m);
      if(status==='pago') recebido += valor;
    });
    arr.push(recebido);
  }
  return arr;
}

function parseBRLInput(raw){
  if(raw==null) return NaN;
  let s = String(raw).trim().replace(/[^\d.,-]/g,'');
  if(s==='') return NaN;
  if(s.includes(',') && s.includes('.')){
    s = s.replace(/\./g,'').replace(',', '.');
  } else if(s.includes(',')){
    s = s.replace(',', '.');
  }
  return Number(s);
}

const MONTHS_SHORT_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_SHORT = new Proxy([], { get(_,prop){ const arr = (typeof state!=='undefined'&&state.lang==='en')?MONTHS_SHORT_EN:MONTHS_SHORT_PT; return arr[prop]; } });
const DC_MONTH_COLORS = [
  {bg:'#EDF5F0', fg:'#1E7F49'}, {bg:'#FAF2EC', fg:'#C2570F'}, {bg:'#F9F1EB', fg:'#B45309'},
  {bg:'#ECF4F3', fg:'#0F766E'}, {bg:'#ECF3EF', fg:'#166534'}, {bg:'#F7EFEC', fg:'#9A3412'},
  {bg:'#F5F1EC', fg:'#854D0E'}, {bg:'#ECF5EF', fg:'#15803D'}, {bg:'#F9F0EB', fg:'#B54708'},
  {bg:'#EBF4F2', fg:'#047857'}, {bg:'#F6F0EC', fg:'#92400E'}, {bg:'#EBF2F0', fg:'#065F46'}
];

  const el = document.getElementById('v-declaracao');

          <div class="dc-money">${v>0?fmtBRL(v):'—'}</div>
          <button class="dc-edit" title="${t('common.edit')} — ${MONTHS_FULL_CAP[i]}" onclick="openEditMonthValue(${year},${i},${computedVals[i]})">✏️</button>
